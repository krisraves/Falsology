name: Inspect RASMUS timed subtitle API

on:
  push:
    paths:
      - .github/workflows/inspect-rasmus-timed-api.yml

permissions:
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
        with:
          ref: exact-statement-windows
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Gradio client
        run: pip install -U gradio_client
      - name: Inspect API
        run: |
          python <<'PY'
          import json,multiprocessing as mp
          from pathlib import Path
          def work(q):
              try:
                  from gradio_client import Client
                  c=Client('RASMUS/Whisper-youtube-crosslingual-subtitles',verbose=False)
                  q.put({'src':c.src,'api':c.view_api(return_format='dict',print_info=False),'config':getattr(c,'config',None)})
              except Exception as e:q.put({'error':f'{type(e).__name__}: {e}'})
          q=mp.Queue();p=mp.Process(target=work,args=(q,));p.start();p.join(600)
          if p.is_alive():p.terminate();p.join();out={'error':'hard timeout'}
          else:out=q.get() if not q.empty() else {'error':f'worker exited {p.exitcode}'}
          Path('audit').mkdir(exist_ok=True);Path('audit/rasmus-timed-api.json').write_text(json.dumps(out,indent=2,ensure_ascii=False,default=str)+'\n')
          PY
      - name: Commit result
        run: |
          rm .github/workflows/inspect-rasmus-timed-api.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Record RASMUS timed subtitle API"
          git pull --rebase origin exact-statement-windows
          git push origin exact-statement-windows
