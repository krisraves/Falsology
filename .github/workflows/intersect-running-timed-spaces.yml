name: Intersect running timed Whisper spaces

on:
  push:
    paths:
      - .github/workflows/intersect-running-timed-spaces.yml

permissions:
  contents: write

jobs:
  intersect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: exact-statement-windows
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build running candidate list
        run: |
          python <<'PY'
          import json
          from pathlib import Path
          code=json.loads(Path('audit/timed-whisper-space-code.json').read_text())
          stages={x.get('id'):x for x in json.loads(Path('audit/transcription-space-stages.json').read_text())}
          rows=[]
          for x in code:
              s=stages.get(x['id'],{})
              if s.get('stage')=='RUNNING':rows.append({**x,'stage':s.get('stage'),'host':s.get('host'),'hardware':s.get('hardware'),'sdk':s.get('sdk')})
          Path('audit/running-timed-whisper-spaces.json').write_text(json.dumps(rows,indent=2,ensure_ascii=False)+'\n')
          PY
      - name: Commit list
        run: |
          rm .github/workflows/intersect-running-timed-spaces.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "List running timed Whisper spaces"
          git pull --rebase origin exact-statement-windows
          git push origin exact-statement-windows
