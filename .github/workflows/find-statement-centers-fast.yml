name: Run fast statement timestamp pass

on:
  push:
    paths:
      - .github/workflows/find-statement-centers-fast.yml

permissions:
  contents: write

jobs:
  locate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: statement-centered-clips
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install tools
        run: pip install -U requests rapidfuzz
      - name: Fast caption and phrase match
        shell: bash
        run: |
          python <<'PY'
          import html,json,re
          from concurrent.futures import ThreadPoolExecutor,as_completed
          from pathlib import Path
          import requests
          from rapidfuzz import fuzz

          WORKER='https://delicate-disk-ef3f.tranductrist.workers.dev/'
          def load(p):return json.loads(Path(p).read_text())
          base=[]
          for p in sorted(Path('data/cases').glob('part*.json')):base.extend(load(p))
          layers=[load('data/case-overrides.json'),load('data/direct-footage-replacements.json'),load('data/obscure-case-replacements.json'),load('data/english-weird-replacements.json')]
          def merge(c,o):
            if not o:return c
            x={**c,**o};x['media']={**c.get('media',{}),**o.get('media',{})};return x
          cases=[]
          for c in base:
            for layer in layers:c=merge(c,layer.get(c['caseNumber']))
            cases.append(c)

          def norm(t):
            t=html.unescape(t or '').lower().replace('’',"'")
            for a,b in [(r'\bi am\b',"i'm"),(r'\bdid not\b',"didn't"),(r'\bdo not\b',"don't"),(r'\bwas not\b',"wasn't"),(r'\bthey are\b',"they're"),(r'\bwe are\b',"we're")]:t=re.sub(a,b,t)
            return re.sub(r'\s+',' ',re.sub(r"[^a-z0-9']+",' ',t)).strip()
          def score(a,b):return max(fuzz.ratio(a,b),fuzz.partial_ratio(a,b),fuzz.token_set_ratio(a,b),fuzz.token_sort_ratio(a,b),fuzz.WRatio(a,b))
          def match(rows,targets):
            targets=[norm(x) for x in targets if norm(x)];out=[]
            for i in range(len(rows)):
              text=''
              for j in range(i,min(len(rows),i+18)):
                text=(text+' '+rows[j]['text']).strip();cand=norm(text)
                raw=max(score(t,cand) for t in targets)
                st=rows[i]['start'];en=rows[j]['start']+rows[j]['duration'];span=en-st
                adjusted=raw-max(0,span-22)*.35-max(0,j-i-10)*.6
                out.append({'score':round(adjusted,2),'rawScore':round(raw,2),'statementStartSeconds':round(st,2),'statementEndSeconds':round(en,2),'matchedText':text})
            return sorted(out,key=lambda x:x['score'],reverse=True)[:10]
          def process(c):
            vid=c['media']['youtubeId'];error=None;payload=None
            try:
              r=requests.get(WORKER,params={'videoId':vid},headers={'User-Agent':'Falsology editorial audit'},timeout=18)
              if r.ok:payload=r.json()
              else:error=f'HTTP {r.status_code}: {r.text[:300]}'
            except Exception as e:error=f'{type(e).__name__}: {e}'
            raw=[]
            if isinstance(payload,list):
              for x in payload:
                if isinstance(x,dict) and isinstance(x.get('start'),(int,float)) and str(x.get('text') or '').strip():raw.append({'text':str(x['text']).strip(),'start':float(x['start'])})
            raw.sort(key=lambda x:x['start']);rows=[]
            for i,x in enumerate(raw):
              next_start=raw[i+1]['start'] if i+1<len(raw) else x['start']+4
              rows.append({'text':x['text'],'start':x['start'],'duration':max(.4,min(12,next_start-x['start']))})
            return {'caseNumber':c['caseNumber'],'person':c['person'],'claim':c['claim'],'transcriptTarget':c.get('transcript'),'verdict':c['verdict'],'videoId':vid,'videoDurationSeconds':c['media'].get('videoDurationSeconds'),'segments':len(rows),'topMatches':match(rows,[c.get('claim',''),c.get('transcript','')]) if rows else [],'error':error,'preview':rows[:10]}

          results=[]
          with ThreadPoolExecutor(max_workers=16) as pool:
            fs=[pool.submit(process,c) for c in cases]
            for f in as_completed(fs):
              x=f.result();results.append(x);best=x['topMatches'][0] if x['topMatches'] else None;print(x['caseNumber'],x['segments'],best['rawScore'] if best else None)
          results.sort(key=lambda x:x['caseNumber'])
          Path('timestamp-audit').mkdir(exist_ok=True)
          Path('timestamp-audit/cloudflare-fast-matches.json').write_text(json.dumps({'source':WORKER,'cases':results},indent=2,ensure_ascii=False)+'\n')
          PY
      - name: Commit report
        run: |
          rm .github/workflows/find-statement-centers-fast.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Record fast statement timestamp pass" || exit 0
          git push origin statement-centered-clips
