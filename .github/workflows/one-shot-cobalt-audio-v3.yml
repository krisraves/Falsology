name: One-shot Cobalt audio probe v3

on:
  push:
    paths:
      - .github/workflows/one-shot-cobalt-audio-v3.yml

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: exact-statement-windows
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install HTTP client
        run: pip install -U requests
      - name: Probe corrected registry and maintained fallback instances
        run: |
          python <<'PY'
          import json,pathlib,requests,time,traceback
          out={'registry':{},'attempts':[]};S=requests.Session()
          ua='Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/140.0.0.0 Safari/537.36'
          source='https://www.youtube.com/watch?v=TM8EXwemnYA'
          fallback=[
            'https://cobalt-backend.canine.tools/',
            'https://cobalt-api.kwiatekmiki.com/',
            'https://capi.3kh0.net/',
            'https://cobalt-api.meowing.de/',
            'https://kityune.imput.net/',
            'https://nachos.imput.net/',
            'https://sunny.imput.net/',
            'https://blossom.imput.net/',
            'https://cobalt-7.kwiatekmiki.com/',
            'https://downloadapi.stuff.solutions/',
          ]
          instances=[]
          for registry in ['https://instances.cobalt.best/api/instances.json','http://instances.cobalt.best/instances.json']:
            try:
              r=S.get(registry,headers={'User-Agent':ua},timeout=30);out['registry'][registry]={'status':r.status_code,'text':r.text[:120000]}
              data=r.json()
              for item in data if isinstance(data,list) else data.get('data',[]) if isinstance(data,dict) else []:
                if isinstance(item,dict):
                  api=item.get('api') or item.get('api_url') or item.get('url')
                  if api and item.get('trust',1)>=1:instances.append(str(api))
            except Exception as e:out['registry'][registry]={'error':f'{type(e).__name__}: {e}'}
          instances=fallback+instances
          seen=set();instances=[x.rstrip('/')+'/' for x in instances if not (x.rstrip('/')+'/' in seen or seen.add(x.rstrip('/')+'/'))]
          pathlib.Path('audit').mkdir(exist_ok=True)
          for api in instances[:30]:
            row={'api':api}
            headers={'accept':'application/json','content-type':'application/json','user-agent':ua,'origin':api.rstrip('/'),'referer':api}
            payloads=[
              {'url':source,'downloadMode':'audio','audioFormat':'mp3'},
              {'url':source,'downloadMode':'audio','audioFormat':'mp3','audioBitrate':'64','alwaysProxy':True},
            ]
            try:
              info=S.get(api,headers={'User-Agent':ua},timeout=15);row['infoStatus']=info.status_code;row['info']=info.text[:5000]
            except Exception as e:row['infoError']=f'{type(e).__name__}: {e}'
            for payload in payloads:
              attempt={'payload':payload}
              try:
                r=S.post(api,json=payload,headers=headers,timeout=60);attempt['status']=r.status_code;attempt['text']=r.text[:15000]
                try:data=r.json()
                except Exception:data={}
                attempt['json']=data
                media_url=data.get('url')
                if not media_url and isinstance(data.get('tunnel'),list) and data['tunnel']:media_url=data['tunnel'][0]
                if media_url:
                  media=S.get(media_url,headers={'User-Agent':ua},timeout=120,allow_redirects=True);attempt['mediaStatus']=media.status_code;attempt['mediaType']=media.headers.get('content-type');attempt['mediaBytes']=len(media.content);attempt['mediaFinalUrl']=media.url
                  if media.status_code==200 and len(media.content)>1000:
                    pathlib.Path('audit/cobalt-audio-sample.bin').write_bytes(media.content);out['success']={'api':api,**attempt};row.setdefault('payloadAttempts',[]).append(attempt);out['attempts'].append(row);break
              except Exception as e:attempt['error']=f'{type(e).__name__}: {e}'
              row.setdefault('payloadAttempts',[]).append(attempt)
            if out.get('success'):break
            out['attempts'].append(row);time.sleep(.25)
          pathlib.Path('audit/cobalt-audio-probe-v3.json').write_text(json.dumps(out,indent=2,ensure_ascii=False,default=str)+'\n')
          PY
      - name: Commit diagnostics and remove workflow
        run: |
          rm .github/workflows/one-shot-cobalt-audio-v3.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Record Cobalt audio probe v3"
          git pull --rebase origin exact-statement-windows
          git push origin exact-statement-windows
