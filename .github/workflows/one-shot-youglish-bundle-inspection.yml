name: One-shot YouGlish bundle inspection

on:
  push:
    paths:
      - .github/workflows/one-shot-youglish-bundle-inspection.yml

permissions:
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: exact-statement-windows
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Fetch and inspect bundle
        run: |
          python <<'PY'
          import json,re,urllib.request
          from pathlib import Path
          url='https://youglish.com/public/bundle.min__53__.js'
          req=urllib.request.Request(url,headers={'User-Agent':'Mozilla/5.0'})
          with urllib.request.urlopen(req,timeout=60) as r:text=r.read().decode('utf-8','replace')
          patterns=['fetchcap','EntryMng','total_results','jsonData','next:function','next=', 'offset','page','loadMore','moreResults','e_start','ck_v','reqType','search.jsp','fetch.jsp']
          snippets={}
          for pat in patterns:
            hits=[]
            for m in list(re.finditer(re.escape(pat),text,re.I))[:50]:hits.append(text[max(0,m.start()-1200):m.start()+2500])
            snippets[pat]=hits
          endpoints=sorted(set(re.findall(r'[A-Za-z0-9_./-]+\.(?:jsp|php|json)(?:\?[^"\'\s<>]*)?',text)))
          Path('audit').mkdir(exist_ok=True)
          Path('audit/youglish-bundle-inspection.json').write_text(json.dumps({'url':url,'length':len(text),'endpoints':endpoints,'snippets':snippets},indent=2,ensure_ascii=False)+'\n')
          PY
      - name: Commit inspection and remove workflow
        run: |
          rm .github/workflows/one-shot-youglish-bundle-inspection.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Record YouGlish result bundle inspection"
          git pull --rebase origin exact-statement-windows
          git push origin exact-statement-windows
