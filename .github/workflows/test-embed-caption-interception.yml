name: Test embed caption interception

on:
  push:
    paths:
      - .github/workflows/test-embed-caption-interception.yml

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: exact-statement-windows
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Playwright
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium
      - name: Capture embed caption traffic
        run: |
          node <<'NODE'
          const { chromium } = require('playwright');
          const fs = require('fs');
          const videos = ['TM8EXwemnYA','3MuPWV5cTio','amHb2UoVZ_g'];
          (async()=>{
            const browser = await chromium.launch({headless:true,args:['--autoplay-policy=no-user-gesture-required','--disable-dev-shm-usage']});
            const results = {};
            for (const videoId of videos) {
              const context = await browser.newContext({locale:'en-US',userAgent:'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/138.0.0.0 Safari/537.36'});
              const page = await context.newPage();
              const network=[]; const captionBodies=[]; const consoleLogs=[];
              page.on('console',m=>consoleLogs.push({type:m.type(),text:m.text()}));
              page.on('response',async response=>{
                const url=response.url();
                if (/timedtext|caption|transcript|player\?|youtubei\/v1\/player/i.test(url)) {
                  const row={url,status:response.status(),contentType:response.headers()['content-type']};
                  try {
                    const body=await response.body(); row.bytes=body.length;
                    const text=body.toString('utf8'); row.preview=text.slice(0,10000);
                    if (/timedtext|caption/i.test(url) && body.length) captionBodies.push(row);
                  } catch(e){row.error=String(e)}
                  network.push(row);
                }
              });
              const html=`<!doctype html><html><body style="margin:0;background:#000"><div id="player"></div><script src="https://www.youtube.com/iframe_api"></script><script>
                let player;
                window.onYouTubeIframeAPIReady=()=>{player=new YT.Player('player',{width:'640',height:'360',videoId:'${videoId}',playerVars:{autoplay:1,controls:0,cc_load_policy:1,cc_lang_pref:'en',hl:'en',playsinline:1,rel:0,origin:'https://falsology.vercel.app'},events:{onReady:e=>{e.target.playVideo();setTimeout(()=>{try{e.target.setOption('captions','track',{'languageCode':'en'});}catch(_){}},1500)},onStateChange:e=>console.log('state',e.data),onError:e=>console.log('yt-error',e.data)}})};
              <\/script></body></html>`;
              await page.setContent(html,{waitUntil:'domcontentloaded'});
              await page.waitForTimeout(18000);
              let playerInfo=null;
              try {
                playerInfo=await page.evaluate(()=>player?{state:player.getPlayerState(),time:player.getCurrentTime(),duration:player.getDuration(),videoData:player.getVideoData(),options:player.getOptions?.(),captionOptions:player.getOptions?.('captions')}:null);
              } catch(e){playerInfo={error:String(e)}}
              results[videoId]={playerInfo,network,captionBodies,consoleLogs};
              await context.close();
            }
            await browser.close();
            fs.mkdirSync('audit',{recursive:true});
            fs.writeFileSync('audit/embed-caption-interception.json',JSON.stringify(results,null,2));
          })().catch(e=>{console.error(e);process.exit(1)});
          NODE
      - name: Commit result
        run: |
          rm .github/workflows/test-embed-caption-interception.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Record embed caption interception test"
          git pull --rebase origin exact-statement-windows
          git push origin exact-statement-windows
