name: Inventory problem source direct lines

on:
  pull_request:
    branches:
      - main
    types:
      - opened

permissions:
  contents: write

jobs:
  inventory:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/exact-statement-clips
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Inventory first-person source passages
        env:
          INVENTORY_WORKERS: "24"
          INVENTORY_TIMEOUT: "65"
        run: python scripts/inventory-problem-source-lines.py
      - name: Save line inventory
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add validation/problem-source-line-inventory.md
          if ! git diff --cached --quiet; then
            git commit -m "Inventory problem source direct lines"
            git push origin agent/exact-statement-clips
          fi
