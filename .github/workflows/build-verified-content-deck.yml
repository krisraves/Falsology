name: Build verified 120-case content deck

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

concurrency:
  group: falsology-verified-content-expansion
  cancel-in-progress: true

jobs:
  build-and-validate:
    if: github.head_ref == 'agent/verified-content-expansion'
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/verified-content-expansion
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install sourcing tools
        run: python -m pip install --upgrade yt-dlp requests

      - name: Build exact-statement cases
        id: content
        continue-on-error: true
        shell: bash
        run: |
          set +e
          if [ -f data/research/content-build-report.json ]; then
            status=$(python - <<'PY'
          import json
          from pathlib import Path
          report = json.loads(Path("data/research/content-build-report.json").read_text())
          print(report.get("status", "unknown"))
          PY
          )
          else
            status="missing"
          fi

          if [ "$status" = "complete" ] && python - <<'PY'
          import json
          from pathlib import Path
          values = json.loads(Path("data/generated-cases.json").read_text())
          raise SystemExit(0 if len(values) == 108 else 1)
          PY
          then
            echo "Existing complete 108-case generated deck found."
            code=0
          elif [ "$status" = "incomplete" ]; then
            echo "Existing incomplete sourcing report found; preserving it for editorial inspection."
            code=2
          else
            python scripts/build-verified-content-deck.py
            code=$?
          fi
          set -e
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Validate complete application
        id: application
        if: steps.content.outputs.exit_code == '0'
        continue-on-error: true
        shell: bash
        run: |
          set +e
          npm ci
          code=$?
          if [ "$code" -eq 0 ]; then npm run lint; code=$?; fi
          if [ "$code" -eq 0 ]; then npm run typecheck; code=$?; fi
          if [ "$code" -eq 0 ]; then npm run build; code=$?; fi
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Save sourcing results
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/research/content-build-report.json data/generated-cases.json || true
          if ! git diff --cached --quiet; then
            git commit -m "Record verified content build results"
            git push origin agent/verified-content-expansion
          fi

          if [ "${{ steps.content.outputs.exit_code }}" != "0" ]; then
            echo "The content builder did not fill every balanced quota."
            exit 1
          fi
          if [ "${{ steps.application.outputs.exit_code }}" != "0" ]; then
            echo "The completed deck failed application validation."
            exit 1
          fi
