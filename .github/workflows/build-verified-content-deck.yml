name: Build verified 120-case content deck

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/build-verified-content-deck.yml
      - verified-content-run.txt

permissions:
  contents: write

concurrency:
  group: falsology-verified-content-expansion
  cancel-in-progress: true

jobs:
  build-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/verified-content-expansion
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install sourcing tools
        run: python -m pip install --upgrade yt-dlp requests

      - name: Restore prior verified-candidate report
        run: git cat-file -p 359d5874a1caab31336c5514f5fa9297227723d5 > data/research/content-build-report-v4.json

      - name: Recover archived exact statements
        run: python scripts/recover-archive-sources.py

      - name: Build exact-statement cases
        id: content
        continue-on-error: true
        shell: bash
        run: |
          set +e
          python scripts/run-content-builder-v6.py
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Validate complete application
        id: application
        if: steps.content.outputs.exit_code == '0'
        continue-on-error: true
        shell: bash
        run: |
          set +e
          npm ci
          code=$?
          if [ "$code" -eq 0 ]; then npm run lint; code=$?; fi
          if [ "$code" -eq 0 ]; then npm run typecheck; code=$?; fi
          if [ "$code" -eq 0 ]; then npm run build; code=$?; fi
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Save sourcing results
        shell: bash
        run: |
          rm -f data/research/content-build-report-v4.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/research/content-build-report.json data/generated-cases.json data/research/archive-source-recovery.json data/recovered-archive-overrides.json || true
          if ! git diff --cached --quiet; then
            git commit -m "Continue verified content sourcing"
            git push origin agent/verified-content-expansion
          fi
          if [ "${{ steps.content.outputs.exit_code }}" != "0" ]; then
            echo "The content builder did not fill every balanced quota."
            exit 1
          fi
          if [ "${{ steps.application.outputs.exit_code }}" != "0" ]; then
            echo "The completed deck failed application validation."
            exit 1
          fi
