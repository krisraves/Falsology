name: Inspect transcription Space source

on:
  push:
    paths:
      - .github/workflows/inspect-transcription-space-source.yml

permissions:
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          ref: exact-statement-windows
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Fetch candidate source files
        run: |
          python <<'PY'
          import json,urllib.parse,urllib.request
          from pathlib import Path
          ids=['Divyanshuinfo/youtube-video-transcription-with-whisper','neillk/youtube-whisper','neuralworm/youtube-transcription-whisper','GhadaSaylami/free-fast-youtube-url-video-to-text-using-openai-whisper','Hamza4100/ai-video-transcription-clip-extractor','ClarityClips/clarityclips-youtube-transcript']
          names=['app.py','README.md','requirements.txt','packages.txt','Dockerfile']
          out={}
          for sid in ids:
              row={}
              for name in names:
                  url='https://huggingface.co/spaces/'+sid+'/resolve/main/'+name+'?download=true'
                  try:
                      req=urllib.request.Request(url,headers={'User-Agent':'Mozilla/5.0'})
                      with urllib.request.urlopen(req,timeout=30) as r:data=r.read()
                      row[name]={'status':r.status,'length':len(data),'content':data.decode('utf-8','replace')[:50000]}
                  except Exception as e:row[name]={'error':f'{type(e).__name__}: {e}'}
              out[sid]=row
          Path('audit').mkdir(exist_ok=True);Path('audit/transcription-space-source.json').write_text(json.dumps(out,indent=2,ensure_ascii=False)+'\n')
          PY
      - name: Commit source inspection
        run: |
          rm .github/workflows/inspect-transcription-space-source.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Record transcription Space source inspection"
          git pull --rebase origin exact-statement-windows
          git push origin exact-statement-windows
