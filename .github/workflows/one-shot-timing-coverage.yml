name: One-shot timing coverage report

on:
  push:
    paths:
      - .github/workflows/one-shot-timing-coverage.yml

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: exact-statement-windows
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build compact report
        run: |
          python <<'PY'
          import json
          from pathlib import Path
          exact=json.loads(Path('audit/exact-index-summary.json').read_text())
          variants=json.loads(Path('audit/variant-index-summary.json').read_text())
          by_exact={x['caseNumber']:x for x in exact};by_var={x['caseNumber']:x for x in variants}
          rows=[]
          for case in sorted(set(by_exact)|set(by_var)):
              e=by_exact.get(case,{}) or {};v=by_var.get(case,{}) or {}
              candidates=[]
              for source,row in [('exact',e),('variant',v)]:
                  for c in row.get('topCandidates',[]):
                      key=(c.get('videoId'),c.get('statementStart'),c.get('statementEnd'))
                      if not any(x['key']==key for x in candidates):candidates.append({'key':key,'source':source,'candidate':c})
              candidates.sort(key=lambda x:-(x['candidate'].get('score') or 0))
              recommended=e.get('recommended') or v.get('recommended')
              rows.append({'caseNumber':case,'person':e.get('person') or v.get('person'),'claim':e.get('claim') or v.get('claim'),'currentVideoId':e.get('currentVideoId') or v.get('currentVideoId'),'exactResults':e.get('totalResults',0),'variantQueriesWithResults':[q for q in v.get('queriesTried',[]) if q.get('results',0)>0],'candidateCount':len(candidates),'recommended':recommended,'topCandidates':[x['candidate']|{'candidateSource':x['source']} for x in candidates[:3]]})
          report={'total':len(rows),'recommendedCount':sum(bool(r['recommended']) for r in rows),'anyCandidateCount':sum(r['candidateCount']>0 for r in rows),'noCandidateCases':[r['caseNumber'] for r in rows if not r['candidateCount']],'recommendedCases':[r['caseNumber'] for r in rows if r['recommended']],'rows':rows}
          Path('audit/timing-coverage.json').write_text(json.dumps(report,indent=2,ensure_ascii=False)+'\n')
          PY
      - name: Commit report and remove workflow
        run: |
          rm .github/workflows/one-shot-timing-coverage.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Record exact timing coverage"
          git pull --rebase origin exact-statement-windows
          git push origin exact-statement-windows
