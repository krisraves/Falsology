name: Verify custom clip player

on:
  push:
    paths:
      - .github/workflows/verify-custom-clip-player.yml

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: custom-clip-player
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install and verify
        run: |
          npm ci
          npm run lint
          npm run typecheck
          npm run build
      - name: Record successful verification
        shell: bash
        run: |
          rm .github/workflows/verify-custom-clip-player.yml
          mkdir -p validation
          cat > validation/custom-clip-player-passed.md <<'EOF'
          # Custom clip player verification

          Passed dataset validation, ESLint, strict TypeScript, and the production Next.js build.
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Verify custom shortened clip player"
          git push origin custom-clip-player
