name: Verify 300 video candidates

on:
  push:
    branches:
      - agent/verify-300-videos
    paths:
      - .github/workflows/verify-300-videos.yml
      - scripts/verify-video-candidates.py
      - verification-trigger.txt

permissions:
  contents: write

concurrency:
  group: falsology-verify-300
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/verify-300-videos
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install verification tools
        run: python -m pip install --upgrade yt-dlp requests

      - name: Verify candidates
        run: python scripts/verify-video-candidates.py

      - name: Commit verification report
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/research/video-verification-report.json data/research/verified-video-candidates.json data/research/video-verification-summary.md
          if ! git diff --cached --quiet; then
            git commit -m "Verify 300 video candidates"
            git push origin agent/verify-300-videos
          fi
