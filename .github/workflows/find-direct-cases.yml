name: Find direct detective cases

on:
  push:
    paths:
      - .github/workflows/find-direct-cases.yml

permissions:
  contents: write

jobs:
  search:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -q yt-dlp
      - name: Search direct footage
        shell: bash
        run: |
          python <<'PY'
          import concurrent.futures, json, subprocess, time
          from pathlib import Path

          queries = {
            "L26": "Scott Peterson interview I had nothing to do with Laci disappearance",
            "L27": "OJ Simpson interview I did not kill Nicole direct statement",
            "L28": "Jussie Smollett interview I did not stage attack direct statement",
            "L29": "Sherri Papini interview kidnapping story direct statement",
            "L30": "Dalia Dippolito police interview denies murder plot",
            "L31": "Pamela Smart interview denies murder plot direct",
            "L32": "Robert Durst interview I did not kill Susan Berman direct",
            "L33": "Rae Carruth interview denies murder plot direct",
            "L34": "Michael Peterson interview did not kill Kathleen direct",
            "L35": "Lori Vallow interview children safe direct statement",
            "L36": "Darlie Routier interview intruder killed sons direct",
            "L37": "Nicholas Rossi interview I am Arthur Knight not fugitive",
            "L38": "Anna Sorokin interview I never told anyone I was heiress",
            "L39": "R Kelly interview I am fighting for my life Gayle King denial",
            "L40": "Oscar Pistorius interview thought intruder Reeva direct",
            "T26": "OJ Simpson interview admits armed robbery Las Vegas",
            "T27": "Mike Tyson interview prison conviction admission",
            "T28": "Mark Wahlberg interview went to jail assault admission",
            "T29": "Martha Stewart interview prison admission direct",
            "T30": "Robert Downey Jr interview prison addiction admission direct",
            "T31": "Danny Trejo interview San Quentin prison admission direct",
            "T32": "Tim Allen interview cocaine prison admission direct",
            "T33": "Sammy Gravano admits 19 murders interview direct",
            "T34": "Michael Franzese admits gas tax scam interview direct",
            "T35": "Jordan Belfort admits securities fraud interview direct",
          }

          def one(item):
            key, query = item
            try:
              raw = subprocess.check_output([
                "yt-dlp", "--flat-playlist", "--dump-single-json", "--playlist-end", "20",
                f"ytsearch20:{query}"
              ], text=True, stderr=subprocess.STDOUT, timeout=120)
              data = json.loads(raw)
              items=[]
              for e in data.get("entries") or []:
                vid=e.get("id")
                items.append({
                  "id":vid,
                  "title":e.get("title"),
                  "channel":e.get("channel") or e.get("uploader"),
                  "duration":e.get("duration"),
                  "url":f"https://www.youtube.com/watch?v={vid}" if vid else None,
                  "views":e.get("view_count"),
                })
              return key,{"query":query,"results":items,"error":None}
            except Exception as exc:
              return key,{"query":query,"results":[],"error":str(exc)}

          result={}
          with concurrent.futures.ThreadPoolExecutor(max_workers=4) as pool:
            for key, data in pool.map(one, queries.items()):
              result[key]=data
              print(key,len(data["results"]),data["error"] or "")
          Path("research").mkdir(exist_ok=True)
          Path("research/additional-direct-cases.json").write_text(json.dumps({
            "generatedAt":time.strftime('%Y-%m-%dT%H:%M:%SZ',time.gmtime()),
            "queries":result,
          },indent=2,ensure_ascii=False)+"\n")
          PY
      - name: Commit results
        shell: bash
        run: |
          rm .github/workflows/find-direct-cases.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Collect additional direct detective case footage"
          git push origin detective-redesign