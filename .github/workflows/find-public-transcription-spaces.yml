name: Find public YouTube transcription spaces

on:
  push:
    paths:
      - .github/workflows/find-public-transcription-spaces.yml

permissions:
  contents: write

jobs:
  search:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
        with:
          ref: exact-statement-windows
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Search Hugging Face Spaces
        run: |
          python <<'PY'
          import json,urllib.parse,urllib.request
          from pathlib import Path
          queries=['youtube transcript','youtube transcription','youtube whisper','video transcript','youtube subtitle']
          out=[]; seen=set()
          for q in queries:
              url='https://huggingface.co/api/spaces?'+urllib.parse.urlencode({'search':q,'limit':100,'full':'true'})
              try:
                  req=urllib.request.Request(url,headers={'User-Agent':'Mozilla/5.0'})
                  with urllib.request.urlopen(req,timeout=30) as r:data=json.load(r)
                  for x in data:
                      sid=x.get('id') or x.get('_id')
                      if not sid or sid in seen:continue
                      seen.add(sid)
                      text=' '.join(str(x.get(k,'')) for k in ['id','title','sdk','tags','cardData']).lower()
                      score=sum(term in text for term in ['youtube','transcript','transcription','whisper','subtitle','video'])
                      if score>=2:out.append({'id':sid,'title':x.get('title'),'sdk':x.get('sdk'),'tags':x.get('tags'),'private':x.get('private'),'disabled':x.get('disabled'),'runtime':x.get('runtime'),'score':score})
              except Exception as e:out.append({'query':q,'error':f'{type(e).__name__}: {e}'})
          out.sort(key=lambda x:(-x.get('score',0),x.get('id','')))
          Path('audit').mkdir(exist_ok=True);Path('audit/public-transcription-spaces.json').write_text(json.dumps(out,indent=2,ensure_ascii=False)+'\n')
          PY
      - name: Commit results
        run: |
          rm .github/workflows/find-public-transcription-spaces.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Record public transcription spaces"
          git pull --rebase origin exact-statement-windows
          git push origin exact-statement-windows
