name: Find remaining direct interviews

on:
  push:
    paths:
      - .github/workflows/find-direct-interviews.yml

permissions:
  contents: write

jobs:
  search:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: direct-footage-audit
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -U yt-dlp
      - name: Search
        run: |
          python <<'PY'
          import json, subprocess
          from pathlib import Path
          queries={
            'SBF':['Sam Bankman Fried full DealBook Summit interview','Sam Bankman Fried I did not knowingly commingle funds full interview'],
            'SANTOS':['George Santos Piers Morgan terrible liar full interview','George Santos I embellished my resume direct interview'],
            'SMOLLETT':['Jussie Smollett full Robin Roberts interview direct','Jussie Smollett there was no hoax testimony direct'],
            'TIM_ALLEN':['Tim Allen prison cocaine full direct interview Howie Mandel'],
          }
          out={}
          for key,items in queries.items():
            found={}
            for query in items:
              try:
                p=subprocess.run(['yt-dlp','--dump-single-json','--flat-playlist',f'ytsearch25:{query}'],capture_output=True,text=True,timeout=120,check=True)
                for e in json.loads(p.stdout).get('entries',[]):
                  vid=e.get('id') or e.get('url')
                  if vid and len(vid)==11:
                    found[vid]={k:e.get(k) for k in ['id','title','channel','uploader','duration','view_count','url']}
              except Exception as exc:
                found[f'error-{len(found)}']={'error':str(exc),'query':query}
            out[key]=list(found.values())
          Path('audit/targeted-direct-search.json').write_text(json.dumps(out,indent=2,ensure_ascii=False)+'\n')
          PY
      - name: Commit
        run: |
          rm .github/workflows/find-direct-interviews.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Record targeted direct interview search"
          git push origin direct-footage-audit
