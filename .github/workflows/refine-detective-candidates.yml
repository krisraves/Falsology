name: Refine detective candidates

on:
  push:
    paths:
      - .github/workflows/refine-detective-candidates.yml

permissions:
  contents: write

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -q yt-dlp
      - name: Search refined statements
        shell: bash
        run: |
          python <<'PY'
          import concurrent.futures, json, subprocess, time
          from pathlib import Path
          queries = {
            "L01R": "Chris Watts original porch interview please bring them back full",
            "L05R": "Casey Anthony police interrogation Zenaida Gonzalez nanny original footage",
            "L06R": "Alex Murdaugh says he was never at kennels police interview clip",
            "L10R": "Stephanie Lazarus interrogation I don't know Sherri Rasmussen clip",
            "L14R": "Bernie Madoff interview impossible to commit violation undetected",
            "L17R": "Pete Rose denies betting on baseball interview 1989",
            "L19R": "George Santos says worked Goldman Sachs interview original",
            "L23R": "Steve Rannazzisi interview 9/11 Merrill Lynch original story",
            "L24R": "Hillary Clinton landed under sniper fire Bosnia original speech",
            "T02R": "Jeffrey Dahmer interview I killed 17 people short clip",
            "T04R": "Aileen Wuornos interview I killed seven men short clip",
            "T17R": "Danny Trejo I was in prison interview short clip",
            "T19R": "Martha Stewart interview I went to prison short clip",
            "T20R": "Robert Downey Jr interview prison addiction criminal past clip",
            "T21R": "Wesley Snipes interview prison tax conviction clip",
            "T22R": "Mike Tyson interview I bit Evander Holyfield ear admission",
            "T23R": "Mark Wahlberg interview criminal past assault jail admission",
            "T24R": "Felicity Huffman apology guilty college admissions scandal video",
            "T25R": "Lori Loughlin apology guilty college admissions scandal video",
            "T05R": "Russell Williams confession I killed Jessica Lloyd clip",
          }
          def search(item):
            key, query = item
            try:
              raw = subprocess.check_output(["yt-dlp","--flat-playlist","--dump-single-json","--playlist-end","15",f"ytsearch15:{query}"], text=True, stderr=subprocess.STDOUT, timeout=100)
              data = json.loads(raw)
              results=[]
              for e in data.get('entries') or []:
                results.append({"id":e.get('id'),"title":e.get('title'),"channel":e.get('channel') or e.get('uploader'),"duration":e.get('duration'),"url":f"https://www.youtube.com/watch?v={e.get('id')}","viewCount":e.get('view_count')})
              return key,{"query":query,"results":results,"error":None}
            except Exception as exc:
              return key,{"query":query,"results":[],"error":str(exc)}
          out={}
          with concurrent.futures.ThreadPoolExecutor(max_workers=4) as pool:
            for key,result in pool.map(search,queries.items()):
              out[key]=result
              print(key,len(result['results']))
          Path('research/detective-refined.json').write_text(json.dumps({"generatedAt":time.strftime('%Y-%m-%dT%H:%M:%SZ',time.gmtime()),"queries":out},indent=2,ensure_ascii=False)+'\n')
          PY
      - name: Commit research
        shell: bash
        run: |
          rm .github/workflows/refine-detective-candidates.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Refine direct statement video candidates"
          git push