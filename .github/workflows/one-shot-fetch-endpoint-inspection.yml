name: One-shot YouGlish fetch endpoint inspection

on:
  push:
    paths:
      - .github/workflows/one-shot-fetch-endpoint-inspection.yml

permissions:
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: exact-statement-windows
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Extract fetch and next logic
        run: |
          python <<'PY'
          import json,re,urllib.request
          from pathlib import Path
          req=urllib.request.Request('https://youglish.com/public/bundle.min__53__.js',headers={'User-Agent':'Mozilla/5.0'})
          with urllib.request.urlopen(req,timeout=60) as r:text=r.read().decode('utf-8','replace')
          needles=['/fetch.jsp?vers=4&rsr=','EntryMng.next','next=function','function next','rsr=','jsTotalResult','getCurrentTrack','getNextTrack','fetch:function','function E(e,t,n)']
          out={'length':len(text),'needles':{}}
          for needle in needles:
            hits=[]
            for m in list(re.finditer(re.escape(needle),text,re.I))[:20]:hits.append({'index':m.start(),'snippet':text[max(0,m.start()-4000):m.start()+8000]})
            out['needles'][needle]=hits
          Path('audit/youglish-fetch-endpoint.json').write_text(json.dumps(out,indent=2,ensure_ascii=False)+'\n')
          PY
      - name: Commit inspection and remove workflow
        run: |
          rm .github/workflows/one-shot-fetch-endpoint-inspection.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Record YouGlish fetch endpoint logic"
          git pull --rebase origin exact-statement-windows
          git push origin exact-statement-windows
