name: Find statement timestamps through caption mirrors

on:
  push:
    paths:
      - .github/workflows/find-statement-centers-piped.yml

permissions:
  contents: write

jobs:
  locate:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
        with:
          ref: statement-centered-clips
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install tools
        run: pip install -U requests rapidfuzz
      - name: Locate exact spoken statements
        shell: bash
        run: |
          python <<'PY'
          import html, json, random, re, time
          from concurrent.futures import ThreadPoolExecutor, as_completed
          from pathlib import Path
          from urllib.parse import urljoin
          import requests
          from rapidfuzz import fuzz

          session=requests.Session()
          session.headers.update({'User-Agent':'Mozilla/5.0 Falsology editorial timestamp audit'})

          def load(path): return json.loads(Path(path).read_text())
          base=[]
          for p in sorted(Path('data/cases').glob('part*.json')): base.extend(load(p))
          layers=[load('data/case-overrides.json'),load('data/direct-footage-replacements.json'),load('data/obscure-case-replacements.json'),load('data/english-weird-replacements.json')]
          def merge(case,override):
              if not override:return case
              out={**case,**override};out['media']={**case.get('media',{}),**override.get('media',{})};return out
          cases=[]
          for case in base:
              for layer in layers: case=merge(case,layer.get(case['caseNumber']))
              cases.append(case)

          instances=[
            'https://pipedapi.kavin.rocks','https://pipedapi.adminforge.de','https://pipedapi.reallyaweso.me',
            'https://pipedapi.leptons.xyz','https://pipedapi.rivo.lol','https://pipedapi.darkness.services',
            'https://pipedapi.moomoo.me','https://pipedapi-libre.kavin.rocks','https://pipedapi.privacy.com.de',
            'https://pipedapi.drgns.space','https://pipedapi.nosebs.ru','https://pipedapi.owo.si',
            'https://pipedapi.privacyredirect.com','https://pipedapi.projectsegfau.lt','https://pipedapi.astartes.nl'
          ]
          try:
              r=session.get('https://piped.video/api/v1/instances',timeout=15)
              if r.ok:
                  data=r.json()
                  for item in data:
                      api=item.get('api_url') or item.get('apiUrl') or item.get('api')
                      if api and isinstance(api,str) and api.startswith('http'): instances.append(api.rstrip('/'))
          except Exception: pass
          instances=list(dict.fromkeys(instances))

          def norm(text):
              text=html.unescape(text or '').lower().replace('’',"'")
              replacements={r'\bi am\b':"i'm",r'\bdid not\b':"didn't",r'\bdo not\b':"don't",r'\bwas not\b':"wasn't",r'\bcould not\b':"couldn't",r'\bthey are\b':"they're"}
              for a,b in replacements.items(): text=re.sub(a,b,text)
              text=re.sub(r"[^a-z0-9']+",' ',text)
              return re.sub(r'\s+',' ',text).strip()

          time_re=re.compile(r'(?P<h>\d{2}):(?P<m>\d{2}):(?P<s>\d{2})[.,](?P<ms>\d{3})')
          short_time_re=re.compile(r'(?P<m>\d{2}):(?P<s>\d{2})[.,](?P<ms>\d{3})')
          def seconds(value):
              m=time_re.fullmatch(value.strip())
              if m:return int(m['h'])*3600+int(m['m'])*60+int(m['s'])+int(m['ms'])/1000
              m=short_time_re.fullmatch(value.strip())
              if m:return int(m['m'])*60+int(m['s'])+int(m['ms'])/1000
              return None
          def parse_vtt(text):
              text=text.replace('\r','')
              rows=[]
              blocks=re.split(r'\n\s*\n',text)
              for block in blocks:
                  lines=[x.strip() for x in block.split('\n') if x.strip()]
                  idx=next((i for i,x in enumerate(lines) if '-->' in x),None)
                  if idx is None:continue
                  a,b=[x.strip().split(' ')[0] for x in lines[idx].split('-->')[:2]]
                  start,end=seconds(a),seconds(b)
                  if start is None or end is None:continue
                  cue=' '.join(lines[idx+1:])
                  cue=re.sub(r'<[^>]+>',' ',cue)
                  cue=re.sub(r'\s+',' ',html.unescape(cue)).strip()
                  if cue:rows.append({'text':cue,'start':start,'duration':max(0,end-start)})
              return rows
          def parse_json3(data):
              rows=[]
              for event in data.get('events',[]):
                  cue=''.join(x.get('utf8','') for x in event.get('segs',[])).replace('\n',' ').strip()
                  if cue:rows.append({'text':cue,'start':event.get('tStartMs',0)/1000,'duration':event.get('dDurationMs',0)/1000})
              return rows

          def get_rows(case):
              vid=case['media']['youtubeId']; errors=[]
              order=instances[:];random.Random(vid).shuffle(order)
              for api in order:
                  try:
                      r=session.get(f'{api}/streams/{vid}',timeout=12)
                      if not r.ok:
                          errors.append(f'{api}:{r.status_code}');continue
                      data=r.json();subs=data.get('subtitles') or []
                      english=[]
                      for sub in subs:
                          code=(sub.get('code') or '').lower();name=(sub.get('name') or '').lower()
                          if code.startswith('en') or 'english' in name: english.append(sub)
                      english.sort(key=lambda x:(bool(x.get('autoGenerated')),0 if (x.get('code') or '').lower()=='en' else 1))
                      for sub in english:
                          url=sub.get('url')
                          if not url:continue
                          url=urljoin(api+'/',url)
                          sr=session.get(url,timeout=15)
                          if not sr.ok:continue
                          ctype=(sr.headers.get('content-type') or '').lower();body=sr.text
                          rows=[]
                          if 'json' in ctype or body.lstrip().startswith('{'):
                              try:rows=parse_json3(sr.json())
                              except Exception:pass
                          if not rows:rows=parse_vtt(body)
                          if rows:return rows,{'instance':api,'subtitle':sub,'duration':data.get('duration')},errors
                  except Exception as e:errors.append(f'{api}:{type(e).__name__}')
              return [],None,errors[-20:]

          def best_match(rows,targets):
              targets=[norm(x) for x in targets if norm(x)]
              best=None
              for i in range(len(rows)):
                  combined=''
                  for j in range(i,min(len(rows),i+18)):
                      combined=(combined+' '+rows[j]['text']).strip();candidate=norm(combined)
                      if not candidate:continue
                      raw=max(max(fuzz.ratio(t,candidate),fuzz.partial_ratio(t,candidate),fuzz.token_set_ratio(t,candidate),fuzz.token_sort_ratio(t,candidate)) for t in targets)
                      st=rows[i]['start'];en=rows[j]['start']+rows[j]['duration'];span=en-st
                      score=raw-max(0,span-20)*.3-max(0,j-i-10)*.5
                      rec={'score':round(score,2),'rawScore':round(raw,2),'statementStartSeconds':round(st,2),'statementEndSeconds':round(en,2),'matchedText':combined}
                      if best is None or rec['score']>best['score']:best=rec
              return best

          def process(case):
              rows,source,errors=get_rows(case)
              match=best_match(rows,[case.get('claim',''),case.get('transcript','')]) if rows else None
              return {'caseNumber':case['caseNumber'],'person':case['person'],'claim':case['claim'],'verdict':case['verdict'],'videoId':case['media']['youtubeId'],'videoDurationSeconds':case['media'].get('videoDurationSeconds'),'captionSource':source,'transcriptSegments':len(rows),'match':match,'errors':errors}

          results=[]
          with ThreadPoolExecutor(max_workers=8) as pool:
              futures={pool.submit(process,c):c for c in cases}
              for future in as_completed(futures):
                  result=future.result();results.append(result)
                  print(result['caseNumber'],result['match']['rawScore'] if result['match'] else None,result['captionSource']['instance'] if result['captionSource'] else 'NO CAPTIONS')
          results.sort(key=lambda x:x['caseNumber'])
          Path('timestamp-audit').mkdir(exist_ok=True)
          Path('timestamp-audit/piped-caption-matches.json').write_text(json.dumps({'instancesTried':instances,'cases':results},indent=2,ensure_ascii=False)+'\n')
          PY
      - name: Commit results
        run: |
          rm .github/workflows/find-statement-centers-piped.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Record mirrored caption matches" || exit 0
          git push origin statement-centered-clips
