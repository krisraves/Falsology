name: Discover 300 video candidates

on:
  push:
    branches:
      - agent/three-hundred-video-decks
    paths:
      - .github/workflows/discover-300-videos.yml
      - scripts/find-video-candidates.py
      - data/video-research-queries.json

permissions:
  contents: write

concurrency:
  group: falsology-300-video-discovery
  cancel-in-progress: true

jobs:
  discover-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/three-hundred-video-decks
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install video discovery tools
        run: python -m pip install --upgrade yt-dlp

      - name: Find 100 candidates per difficulty
        id: discovery
        continue-on-error: true
        shell: bash
        run: |
          set +e
          python scripts/find-video-candidates.py
          code=$?
          set -e
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"

      - name: Validate application
        run: |
          npm ci
          npm run lint
          npm run typecheck
          npm run build

      - name: Save candidate research pool
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/research/video-candidates.json
          if ! git diff --cached --quiet; then
            git commit -m "Add 300-video difficulty research pool"
            git push origin agent/three-hundred-video-decks
          fi
          if [ "${{ steps.discovery.outputs.exit_code }}" != "0" ]; then
            echo "Video discovery did not reach 100 candidates in every level."
            exit 1
          fi
