name: Install verified Falsology source

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/deploy-source.yml"

permissions:
  contents: write

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reassemble verified source
        shell: bash
        run: |
          set -euo pipefail
          cat .deploy/source.* > /tmp/falsology-source.b64
          base64 --decode /tmp/falsology-source.b64 > /tmp/falsology-source.tgz
          echo "c88b8ddcbfaad7e12e795d7aa95ea0ea637dc7d8d86aa7b2f9f799b8f12f1240  /tmp/falsology-source.tgz" | sha256sum --check -

      - name: Replace staging tree
        shell: bash
        run: |
          set -euo pipefail
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          tar -xzf /tmp/falsology-source.tgz -C .

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate production build
        shell: bash
        run: |
          set -euo pipefail
          npm install
          npm run lint
          npm run typecheck
          npm run build

      - name: Commit clean source tree
        shell: bash
        run: |
          set -euo pipefail
          rm -rf node_modules .next tsconfig.tsbuildinfo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Build deployable Falsology site"
          git push origin main
