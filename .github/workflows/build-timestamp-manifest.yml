name: Build timestamp review manifest

on:
  push:
    paths:
      - .github/workflows/build-timestamp-manifest.yml

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: exact-statement-windows
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Build flattened manifest
        run: |
          node <<'NODE'
          const fs=require('fs'); const path=require('path');
          const parts=fs.readdirSync('data/cases').filter(n=>/^part\d\d\.json$/.test(n)).sort();
          let claims=parts.flatMap(n=>JSON.parse(fs.readFileSync(path.join('data/cases',n),'utf8')));
          const layers=['case-overrides.json','direct-footage-replacements.json','obscure-case-replacements.json','english-weird-replacements.json'].map(n=>JSON.parse(fs.readFileSync(path.join('data',n),'utf8')));
          const diff=JSON.parse(fs.readFileSync('data/difficulty-map.json','utf8'));
          const merge=(claim,o={})=>({...claim,...o,media:{...(claim.media||{}),...(o.media||{})}});
          claims=claims.map(c=>{for(const layer of layers)c=merge(c,layer[c.caseNumber]);return {...c,difficulty:diff[c.caseNumber]||c.difficulty}});
          const rows=claims.map(c=>({caseNumber:c.caseNumber,person:c.person,claim:c.claim,verdict:c.verdict,difficulty:c.difficulty,videoId:c.media.youtubeId,videoDurationSeconds:c.media.videoDurationSeconds,currentStart:c.media.startSeconds,currentEnd:c.media.endSeconds,sourceUrl:c.media.url,sourceKind:c.media.sourceKind}));
          fs.mkdirSync('audit',{recursive:true}); fs.writeFileSync('audit/live-case-manifest.json',JSON.stringify(rows,null,2)+'\n');
          NODE
      - name: Commit manifest
        run: |
          rm .github/workflows/build-timestamp-manifest.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add timestamp review manifest"
          git pull --rebase origin exact-statement-windows
          git push origin exact-statement-windows
