name: Finalize direct-footage deck

on:
  push:
    paths:
      - .github/workflows/finalize-direct-footage.yml

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: direct-footage-audit
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Remove temporary research artifacts
        shell: bash
        run: |
          rm -rf audit
          rm .github/workflows/finalize-direct-footage.yml
      - name: Validate clean production tree
        shell: bash
        run: |
          npm ci
          npm run validate:cases
          npm run lint
          npm run typecheck
          npm run build
      - name: Commit clean tested branch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Finalize 45-second direct-footage deck"
          git push origin direct-footage-audit
