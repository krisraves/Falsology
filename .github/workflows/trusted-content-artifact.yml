name: Trusted verified content artifact build

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

concurrency:
  group: falsology-trusted-content-artifact
  cancel-in-progress: true

jobs:
  build-artifact:
    if: github.head_ref == 'agent/verified-content-expansion'
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/verified-content-expansion
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install sourcing tools
        run: python -m pip install --upgrade yt-dlp requests

      - name: Restore prior candidates and expand seeds
        run: |
          git cat-file -p 359d5874a1caab31336c5514f5fa9297227723d5 > data/research/content-build-report-v4.json
          python scripts/extend-truth-seeds.py

      - name: Recover archived exact statements
        run: python scripts/recover-archive-sources.py

      - name: Build exact-statement cases
        shell: bash
        run: |
          set +e
          python scripts/run-content-builder-v6.py
          code=$?
          set -e
          echo "$code" > data/research/content-build-exit.txt

      - name: Validate completed deck
        shell: bash
        run: |
          if [ "$(cat data/research/content-build-exit.txt)" = "0" ]; then
            npm ci
            npm run lint
            npm run typecheck
            npm run build
            echo "passed" > data/research/application-validation.txt
          else
            echo "not-run-incomplete-deck" > data/research/application-validation.txt
          fi

      - name: Upload sourcing artifact
        uses: actions/upload-artifact@v4
        with:
          name: verified-content-build
          if-no-files-found: error
          retention-days: 7
          path: |
            data/generated-cases.json
            data/recovered-archive-overrides.json
            data/research/archive-source-recovery.json
            data/research/content-build-report.json
            data/research/content-build-exit.txt
            data/research/application-validation.txt
            data/research/content-seeds/*.json
