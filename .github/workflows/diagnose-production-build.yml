name: Diagnose production build

on:
  push:
    paths:
      - .github/workflows/diagnose-production-build.yml

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Run validation pipeline and capture logs
        shell: bash
        run: |
          set +e
          mkdir -p research
          npm ci > research/npm-ci.log 2>&1
          CI_STATUS=$?
          npm run generate:claims > research/generate-claims.log 2>&1
          GENERATE_STATUS=$?
          npm run validate:claims > research/validate-claims.log 2>&1
          VALIDATE_STATUS=$?
          npm run lint > research/lint.log 2>&1
          LINT_STATUS=$?
          npm run typecheck > research/typecheck.log 2>&1
          TYPECHECK_STATUS=$?
          npm run build > research/build.log 2>&1
          BUILD_STATUS=$?
          python - <<PY
          import json
          report = {
            "npmCi": $CI_STATUS,
            "generateClaims": $GENERATE_STATUS,
            "validateClaims": $VALIDATE_STATUS,
            "lint": $LINT_STATUS,
            "typecheck": $TYPECHECK_STATUS,
            "build": $BUILD_STATUS,
          }
          open("research/build-diagnostics.json", "w").write(json.dumps(report, indent=2) + "\n")
          PY
          rm -f .github/workflows/diagnose-production-build.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Record production build diagnostics"
          git push
          exit $((CI_STATUS || GENERATE_STATUS || VALIDATE_STATUS || LINT_STATUS || TYPECHECK_STATUS || BUILD_STATUS))
