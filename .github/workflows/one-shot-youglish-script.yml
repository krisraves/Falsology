name: One-shot YouGlish widget source

on:
  push:
    paths:
      - .github/workflows/one-shot-youglish-script.yml

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: exact-statement-windows
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Playwright
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium
      - name: Load widget script as top-level document
        run: |
          node <<'NODE'
          const {chromium}=require('playwright');const fs=require('fs');
          (async()=>{
            const browser=await chromium.launch({headless:true,args:['--disable-blink-features=AutomationControlled','--disable-dev-shm-usage','--no-sandbox']});
            const context=await browser.newContext({locale:'en-US',userAgent:'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/140.0.0.0 Safari/537.36'});const page=await context.newPage();
            const out={requests:[],responses:[],failures:[],console:[]};
            page.on('console',m=>out.console.push({type:m.type(),text:m.text()}));page.on('requestfailed',r=>out.failures.push({url:r.url(),failure:r.failure()}));
            page.on('request',r=>out.requests.push({url:r.url(),method:r.method(),resourceType:r.resourceType()}));
            page.on('response',async r=>{const row={url:r.url(),status:r.status(),contentType:r.headers()['content-type']};try{const b=await r.body();row.bytes=b.length;row.text=b.toString('utf8').slice(0,1000000)}catch(e){row.error=String(e)}out.responses.push(row)});
            let error=null;try{await page.goto('https://youglish.com/public/js/widgetapi.js',{waitUntil:'commit',timeout:60000})}catch(e){error=String(e)}await page.waitForTimeout(15000);
            out.error=error;out.finalUrl=page.url();out.title=await page.title();out.body=(await page.locator('body').innerText().catch(()=>'' )).slice(0,1000000);out.html=(await page.content()).slice(0,1000000);
            fs.mkdirSync('audit',{recursive:true});fs.writeFileSync('audit/youglish-widget-source.json',JSON.stringify(out,null,2));await browser.close();
          })().catch(e=>{console.error(e);process.exit(1)});
          NODE
      - name: Commit result and remove workflow
        run: |
          rm .github/workflows/one-shot-youglish-script.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Record YouGlish widget source probe"
          git pull --rebase origin exact-statement-windows
          git push origin exact-statement-windows
