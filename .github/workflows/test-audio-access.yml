name: Test source audio access

on:
  push:
    paths:
      - .github/workflows/test-audio-access.yml

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: exact-statement-windows
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install tools
        run: pip install -U requests yt-dlp
      - name: Probe audio methods
        run: |
          python <<'PY'
          import json, subprocess, requests
          from pathlib import Path
          vid='3MuPWV5cTio'
          S=requests.Session(); S.headers.update({'User-Agent':'Mozilla/5.0'})
          out={'videoId':vid,'piped':[],'invidious':[],'ytdlp':[]}
          piped=['https://pipedapi.kavin.rocks','https://pipedapi.adminforge.de','https://pipedapi.reallyaweso.me','https://pipedapi.leptons.xyz','https://pipedapi.darkness.services','https://pipedapi.r4fo.com']
          for base in piped:
              row={'base':base}
              try:
                  r=S.get(f'{base}/streams/{vid}',timeout=15); row['status']=r.status_code
                  data=r.json(); audio=data.get('audioStreams') or []; row['audioCount']=len(audio); row['duration']=data.get('duration'); row['title']=data.get('title')
                  if audio:
                      u=audio[0].get('url'); row['audioUrlPrefix']=str(u)[:180]
                      rr=S.get(u,headers={'Range':'bytes=0-65535'},timeout=20); row['audioStatus']=rr.status_code; row['audioBytes']=len(rr.content); row['contentType']=rr.headers.get('content-type')
              except Exception as e: row['error']=f'{type(e).__name__}: {e}'
              out['piped'].append(row)
          inv=['https://yewtu.be','https://inv.nadeko.net','https://invidious.private.coffee','https://inv.us.projectsegfau.lt','https://invidious.jing.rocks','https://invidious.nerdvpn.de']
          for base in inv:
              row={'base':base}
              try:
                  r=S.get(f'{base}/api/v1/videos/{vid}',timeout=15); row['status']=r.status_code
                  data=r.json(); formats=data.get('adaptiveFormats') or []; audio=[f for f in formats if str(f.get('type','')).startswith('audio/')]; row['audioCount']=len(audio); row['lengthSeconds']=data.get('lengthSeconds')
                  if audio:
                      u=audio[0].get('url'); row['audioUrlPrefix']=str(u)[:180]
                      rr=S.get(u,headers={'Range':'bytes=0-65535'},timeout=20); row['audioStatus']=rr.status_code; row['audioBytes']=len(rr.content); row['contentType']=rr.headers.get('content-type')
              except Exception as e: row['error']=f'{type(e).__name__}: {e}'
              out['invidious'].append(row)
          clients=['android','android_vr','web_creator','tv_embedded','mweb']
          for client in clients:
              row={'client':client}
              try:
                  p=subprocess.run(['yt-dlp','--skip-download','--dump-single-json','--extractor-args',f'youtube:player_client={client}',f'https://www.youtube.com/watch?v={vid}'],text=True,capture_output=True,timeout=90)
                  row['returncode']=p.returncode; row['stderr']=p.stderr[-2000:]
                  if p.returncode==0:
                      data=json.loads(p.stdout); row['title']=data.get('title'); row['duration']=data.get('duration'); row['formatCount']=len(data.get('formats') or [])
              except Exception as e: row['error']=f'{type(e).__name__}: {e}'
              out['ytdlp'].append(row)
          Path('audit').mkdir(exist_ok=True)
          Path('audit/audio-access-test.json').write_text(json.dumps(out,indent=2,ensure_ascii=False)+'\n')
          PY
      - name: Commit results
        run: |
          rm .github/workflows/test-audio-access.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Record source audio access test"
          git pull --rebase origin exact-statement-windows
          git push origin exact-statement-windows
