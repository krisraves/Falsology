name: One-shot Cobalt audio probe v2

on:
  push:
    paths:
      - .github/workflows/one-shot-cobalt-audio-v2.yml

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 18
    steps:
      - uses: actions/checkout@v4
        with:
          ref: exact-statement-windows
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install HTTP client
        run: pip install -U requests
      - name: Probe public Cobalt registry and one short source
        continue-on-error: true
        run: |
          python <<'PY'
          import json, pathlib, requests, time, traceback
          output=pathlib.Path('audit');output.mkdir(exist_ok=True)
          S=requests.Session();S.headers.update({'User-Agent':'Falsology one-time editorial timestamp audit/1.0','Accept':'application/json'})
          out={'registries':{},'attempts':[]}
          try:
            registries=['https://cobalt.directory/api/tests','https://instances.cobalt.best/instances.json']
            candidates=[]
            for url in registries:
              try:
                r=S.get(url,timeout=30);data=r.json();serialized=json.dumps(data,default=str)
                out['registries'][url]={'status':r.status_code,'type':type(data).__name__,'preview':data if len(serialized)<120000 else serialized[:120000]}
                rows=data.get('data') if isinstance(data,dict) else data if isinstance(data,list) else []
                for item in rows or []:
                  if not isinstance(item,dict):continue
                  api=item.get('api') or item.get('url') or item.get('instance')
                  if api:candidates.append({'api':api,'source':url,'meta':item})
              except Exception as e:out['registries'][url]={'error':f'{type(e).__name__}: {e}'}
            seen=set();dedup=[]
            for item in candidates:
              api=str(item['api']).rstrip('/')
              if not api.startswith('http') or api in seen:continue
              seen.add(api);item['api']=api;dedup.append(item)
            def score(item):
              text=json.dumps(item.get('meta',{}),default=str).lower();value=0
              if 'youtube' in text:value+=5
              if any(k in text for k in ['success','online','healthy','passed']):value+=3
              if any(k in text for k in ['offline','failed','runtime_error']):value-=4
              return -value
            dedup.sort(key=score);out['candidateCount']=len(dedup);out['candidates']=dedup[:80]
            source='https://www.youtube.com/watch?v=TM8EXwemnYA'
            for item in dedup[:35]:
              api=item['api'];row={'api':api,'sourceRegistry':item['source'],'meta':item.get('meta')}
              try:
                info=S.get(api+'/',timeout=15);row['infoStatus']=info.status_code;row['infoPreview']=info.text[:5000]
                body={'url':source,'downloadMode':'audio','audioFormat':'mp3','audioBitrate':'64','disableMetadata':True,'alwaysProxy':True}
                response=S.post(api+'/',json=body,headers={'Content-Type':'application/json','Accept':'application/json'},timeout=60);row['postStatus']=response.status_code;row['postText']=response.text[:12000]
                try:result=response.json()
                except Exception:result={}
                row['result']=result
                media_url=result.get('url')
                if not media_url and isinstance(result.get('tunnel'),list) and result['tunnel']:media_url=result['tunnel'][0]
                if media_url:
                  media=S.get(media_url,timeout=90,allow_redirects=True);row['mediaStatus']=media.status_code;row['mediaBytes']=len(media.content);row['mediaType']=media.headers.get('content-type');row['finalMediaUrl']=media.url
                  if media.status_code==200 and len(media.content)>1000:
                    pathlib.Path('audit/cobalt-audio-sample.bin').write_bytes(media.content);out['success']=row;out['attempts'].append(row);break
              except Exception as e:row['error']=f'{type(e).__name__}: {e}'
              out['attempts'].append(row);time.sleep(.25)
          except Exception as e:
            out['fatalError']=f'{type(e).__name__}: {e}';out['traceback']=traceback.format_exc()
          finally:
            pathlib.Path('audit/cobalt-audio-probe.json').write_text(json.dumps(out,indent=2,ensure_ascii=False,default=str)+'\n')
          PY
      - name: Commit diagnostics and remove workflow
        run: |
          rm .github/workflows/one-shot-cobalt-audio-v2.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Record Cobalt audio probe v2"
          git pull --rebase origin exact-statement-windows
          git push origin exact-statement-windows
