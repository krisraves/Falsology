name: Test one timed transcript

on:
  push:
    paths:
      - .github/workflows/test-one-clarity-transcript.yml

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          ref: exact-statement-windows
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install client
        run: pip install -U gradio_client
      - name: Call one transcript with timeout
        run: |
          python <<'PY'
          import json,multiprocessing as mp
          from pathlib import Path
          def work(q):
              try:
                  from gradio_client import Client
                  c=Client('ClarityClips/clarityclips-youtube-transcript',verbose=False)
                  result=c.predict(video_id='3MuPWV5cTio',languages='en',format_type='WebVTT',translate_to='',preserve_formatting=False,api_name='/get_transcript')
                  q.put({'ok':True,'result':result,'type':type(result).__name__})
              except Exception as e:q.put({'ok':False,'error':f'{type(e).__name__}: {e}'})
          q=mp.Queue();p=mp.Process(target=work,args=(q,));p.start();p.join(180)
          if p.is_alive():p.terminate();p.join();out={'ok':False,'error':'hard timeout after 180 seconds'}
          else:out=q.get() if not q.empty() else {'ok':False,'error':f'worker exited {p.exitcode} without result'}
          Path('audit').mkdir(exist_ok=True);Path('audit/one-clarity-transcript.json').write_text(json.dumps(out,indent=2,ensure_ascii=False,default=str)+'\n')
          PY
      - name: Commit result
        run: |
          rm .github/workflows/test-one-clarity-transcript.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Record one timed transcript test"
          git pull --rebase origin exact-statement-windows
          git push origin exact-statement-windows
