name: Locate exact statement timestamps

on:
  push:
    paths:
      - .github/workflows/find-statement-timestamps.yml

permissions:
  contents: write

jobs:
  locate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: direct-footage-audit
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -U yt-dlp
      - name: Download captions and locate phrases
        shell: bash
        run: |
          python <<'PY'
          import json, re, subprocess
          from pathlib import Path

          targets={
            'SBF':('IyoGdwVIwWw',["didn't ever try to commit fraud","didn't knowingly commingle funds","did not knowingly commingle funds"]),
            'SANTOS':('I7p-6HHUgl4',["i've been a terrible liar","terrible liar on those subjects"]),
            'SMOLLETT':('4lvrPFW0ztY',["you don't even want to see the truth","i'm pissed off","attack"]),
            'TIM_ALLEN':('nBUjN_6PK6U',["prison","cocaine","arrested"]),
            'GACY':('yQ4AT4q2DKs',["don't believe i killed anybody","i killed anybody"]),
            'MCDANIEL':('fAISMApjd5c',["don't know what happened","what happened to lauren"]),
            'WATTS_CONFESSION':('eWsXwpgCG8Q',["i killed shanann","shanann"]),
          }
          out={}
          root=Path('audit/captions'); root.mkdir(parents=True,exist_ok=True)

          def normalize(s):
            return re.sub(r'[^a-z0-9 ]+',' ',s.lower()).strip()

          for key,(vid,phrases) in targets.items():
            prefix=root/vid
            cmd=['yt-dlp','--skip-download','--write-subs','--write-auto-subs','--sub-langs','en,en-US,en-GB','--sub-format','json3','-o',str(prefix),'https://www.youtube.com/watch?v='+vid]
            p=subprocess.run(cmd,capture_output=True,text=True,timeout=180)
            files=list(root.glob(vid+'*.json3'))
            result={'videoId':vid,'returncode':p.returncode,'stderr':p.stderr[-1500:],'matches':[],'captionFiles':[f.name for f in files]}
            if files:
              data=json.loads(files[0].read_text())
              chunks=[]
              for event in data.get('events',[]):
                text=''.join(seg.get('utf8','') for seg in event.get('segs',[])).replace('\n',' ')
                if text.strip(): chunks.append({'start':event.get('tStartMs',0)/1000,'duration':event.get('dDurationMs',0)/1000,'text':text.strip()})
              for i in range(len(chunks)):
                joined=' '.join(c['text'] for c in chunks[i:i+8])
                normalized=normalize(joined)
                for phrase in phrases:
                  if normalize(phrase) in normalized:
                    result['matches'].append({'phrase':phrase,'start':chunks[i]['start'],'text':joined[:700]})
              result['firstCaption']=chunks[:8]
            out[key]=result
          Path('audit/statement-timestamps.json').write_text(json.dumps(out,indent=2,ensure_ascii=False)+'\n')
          PY
      - name: Remove temporary caption files
        run: rm -rf audit/captions
      - name: Commit results
        run: |
          rm .github/workflows/find-statement-timestamps.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Record direct statement timestamps"
          git push origin direct-footage-audit
