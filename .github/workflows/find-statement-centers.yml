name: Find exact statement timestamps

on:
  push:
    paths:
      - .github/workflows/find-statement-centers.yml

permissions:
  contents: write

jobs:
  locate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: statement-centered-clips
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install transcript tools
        run: pip install -U youtube-transcript-api rapidfuzz yt-dlp
      - name: Locate statements in captions
        shell: bash
        run: |
          python <<'PY'
          import json, re, subprocess, tempfile
          from pathlib import Path
          from rapidfuzz import fuzz

          def load(path):
              return json.loads(Path(path).read_text())

          base=[]
          for path in sorted(Path('data/cases').glob('part*.json')):
              base.extend(load(path))
          layers=[
              load('data/case-overrides.json'),
              load('data/direct-footage-replacements.json'),
              load('data/obscure-case-replacements.json'),
              load('data/english-weird-replacements.json'),
          ]

          def merge_case(case, override):
              if not override: return case
              out={**case, **override}
              out['media']={**case.get('media',{}), **override.get('media',{})}
              return out

          cases=[]
          for case in base:
              for layer in layers:
                  case=merge_case(case, layer.get(case['caseNumber']))
              cases.append(case)

          def norm(text):
              text=(text or '').lower().replace('’',"'").replace('“','"').replace('”','"')
              text=re.sub(r"\b(i am)\b", "i'm", text)
              text=re.sub(r"\b(did not)\b", "didn't", text)
              text=re.sub(r"\b(do not)\b", "don't", text)
              text=re.sub(r"\b(was not)\b", "wasn't", text)
              text=re.sub(r"\b(could not)\b", "couldn't", text)
              text=re.sub(r"[^a-z0-9']+", ' ', text)
              return re.sub(r'\s+', ' ', text).strip()

          def fetch_transcript(video_id):
              errors=[]
              try:
                  from youtube_transcript_api import YouTubeTranscriptApi
                  api=YouTubeTranscriptApi()
                  if hasattr(api,'fetch'):
                      transcript=api.fetch(video_id, languages=['en','en-US','en-GB'])
                      rows=[]
                      for item in transcript:
                          if hasattr(item,'text'):
                              rows.append({'text':item.text,'start':float(item.start),'duration':float(item.duration)})
                          else:
                              rows.append({'text':item['text'],'start':float(item['start']),'duration':float(item['duration'])})
                      if rows: return rows, errors, 'youtube-transcript-api'
                  elif hasattr(YouTubeTranscriptApi,'get_transcript'):
                      rows=YouTubeTranscriptApi.get_transcript(video_id, languages=['en','en-US','en-GB'])
                      if rows: return rows, errors, 'youtube-transcript-api'
              except Exception as e:
                  errors.append(f'youtube-transcript-api: {type(e).__name__}: {e}')

              try:
                  with tempfile.TemporaryDirectory() as td:
                      tmpl=str(Path(td)/'%(id)s.%(ext)s')
                      proc=subprocess.run([
                          'yt-dlp','--skip-download','--write-auto-subs','--write-subs',
                          '--sub-langs','en.*,en','--sub-format','json3','-o',tmpl,
                          f'https://www.youtube.com/watch?v={video_id}'
                      ],capture_output=True,text=True,timeout=75)
                      if proc.returncode:
                          errors.append('yt-dlp: '+proc.stderr[-1200:])
                      for p in Path(td).glob('*.json3'):
                          data=json.loads(p.read_text())
                          rows=[]
                          for event in data.get('events',[]):
                              segs=event.get('segs') or []
                              text=''.join(seg.get('utf8','') for seg in segs).replace('\n',' ').strip()
                              if not text: continue
                              rows.append({'text':text,'start':event.get('tStartMs',0)/1000,'duration':event.get('dDurationMs',0)/1000})
                          if rows: return rows, errors, 'yt-dlp-json3'
              except Exception as e:
                  errors.append(f'yt-dlp: {type(e).__name__}: {e}')
              return [], errors, None

          def match_statement(rows, targets):
              targets=[norm(x) for x in targets if norm(x)]
              best=None
              # Search windows of caption segments. Longer windows are penalized slightly.
              for i in range(len(rows)):
                  combined=''
                  for j in range(i, min(len(rows), i+16)):
                      combined=(combined+' '+rows[j]['text']).strip()
                      candidate=norm(combined)
                      if not candidate: continue
                      scores=[]
                      for target in targets:
                          scores.extend([
                              fuzz.ratio(target,candidate),
                              fuzz.partial_ratio(target,candidate),
                              fuzz.token_set_ratio(target,candidate),
                              fuzz.token_sort_ratio(target,candidate),
                          ])
                      raw=max(scores)
                      window_seconds=(rows[j]['start']+rows[j]['duration'])-rows[i]['start']
                      score=raw-max(0,window_seconds-18)*0.25-max(0,(j-i)-8)*0.5
                      record={
                          'score':round(score,2),'rawScore':round(raw,2),
                          'statementStartSeconds':round(rows[i]['start'],2),
                          'statementEndSeconds':round(rows[j]['start']+rows[j]['duration'],2),
                          'matchedText':combined,
                          'segmentStartIndex':i,'segmentEndIndex':j,
                      }
                      if best is None or record['score']>best['score']:
                          best=record
              return best

          output={'generatedAt':'2026-07-15','cases':[]}
          for idx,case in enumerate(cases,1):
              media=case['media']; video_id=media['youtubeId']
              rows,errors,method=fetch_transcript(video_id)
              targets=[case.get('claim',''),case.get('transcript','')]
              match=match_statement(rows,targets) if rows else None
              result={
                  'caseNumber':case['caseNumber'],'person':case['person'],'verdict':case['verdict'],
                  'claim':case['claim'],'videoId':video_id,'videoDurationSeconds':media.get('videoDurationSeconds'),
                  'currentStartSeconds':media.get('startSeconds'),'currentEndSeconds':media.get('endSeconds'),
                  'transcriptMethod':method,'transcriptSegments':len(rows),'match':match,'errors':errors,
              }
              output['cases'].append(result)
              marker='MATCH' if match and match['rawScore']>=75 else 'REVIEW'
              print(f'[{idx:02d}/50] {case["caseNumber"]} {marker} score={match["rawScore"] if match else None} segments={len(rows)}')

          Path('timestamp-audit').mkdir(exist_ok=True)
          Path('timestamp-audit/statement-caption-matches.json').write_text(json.dumps(output,indent=2,ensure_ascii=False)+'\n')
          PY
      - name: Commit timestamp report
        run: |
          rm .github/workflows/find-statement-centers.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Record statement caption matches" || exit 0
          git push origin statement-centered-clips
