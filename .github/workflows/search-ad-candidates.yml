name: Search deceptive advertising clips

on:
  push:
    paths:
      - .github/workflows/search-ad-candidates.yml

permissions:
  contents: write

jobs:
  search:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade yt-dlp
      - name: Search candidates
        shell: bash
        run: |
          python <<'PY'
          import concurrent.futures, json, subprocess, time
          from pathlib import Path
          queries = [
            ("AD01", "Skechers Shape Ups commercial tone muscles lose weight"),
            ("AD02", "Reebok EasyTone commercial better legs butt"),
            ("AD03", "Lumosity commercial prevent memory loss brain games"),
            ("AD04", "Airborne cold remedy commercial prevents colds"),
            ("AD05", "POM Wonderful commercial heart disease prostate cancer"),
            ("AD06", "Kellogg Rice Krispies immunity commercial"),
            ("AD07", "Dannon Activia clinically proven commercial"),
            ("AD08", "DanActive immunity commercial"),
            ("AD09", "Sensa weight loss commercial sprinkle"),
            ("AD10", "L'Oreal mascara false lashes commercial banned"),
          ]
          def run(pair):
            key, query = pair
            try:
              done = subprocess.run(["yt-dlp","--flat-playlist","--dump-single-json",f"ytsearch15:{query}"],capture_output=True,text=True,timeout=90,check=True)
              data=json.loads(done.stdout)
              return key,{"query":query,"results":[{"videoId":e.get("id"),"title":e.get("title"),"channel":e.get("channel") or e.get("uploader"),"duration":e.get("duration"),"url":e.get("url") or e.get("webpage_url"),"viewCount":e.get("view_count")} for e in (data.get("entries") or [])]}
            except Exception as exc:
              return key,{"query":query,"results":[],"error":f"{type(exc).__name__}: {getattr(exc,'stderr',None) or exc}"}
          out={"generatedAt":time.strftime('%Y-%m-%dT%H:%M:%SZ',time.gmtime()),"queries":{}}
          with concurrent.futures.ThreadPoolExecutor(max_workers=8) as pool:
            for key,record in pool.map(run,queries): out["queries"][key]=record
          Path("research/ad-candidates.json").write_text(json.dumps(out,indent=2)+"\n")
          PY
      - name: Commit results
        shell: bash
        run: |
          rm -f .github/workflows/search-ad-candidates.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Collect deceptive advertising video candidates"
          git push
