name: Find English weird truths

on:
  push:
    paths:
      - .github/workflows/find-two-english-weird-truths.yml

permissions:
  contents: write

jobs:
  search:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: simple-home-obscure-cases
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -U yt-dlp
      - name: Search
        shell: bash
        run: |
          python <<'PY'
          import json, subprocess
          from pathlib import Path
          topics={
            "PACKARD":["Michael Packard swallowed by whale direct interview", "Michael Packard lobster diver whale full interview"],
            "TEMPLER":["Paul Templer swallowed by hippo direct interview", "Paul Templer hippo attack full interview"],
            "CALLAHAN":["Steven Callahan 76 days adrift direct interview", "Steven Callahan full interview survival"],
            "SIMPSON":["Joe Simpson Touching the Void direct interview", "Joe Simpson crawled broken leg interview"],
            "WEATHERS":["Beck Weathers left for dead Everest direct interview", "Beck Weathers full interview survival"],
            "DUNCAN":["Truman Duncan cut in half train direct interview", "Truman Duncan survivor full interview"]
          }
          def search(q):
            try:
              p=subprocess.run(["yt-dlp","--dump-single-json","--flat-playlist",f"ytsearch20:{q}"],capture_output=True,text=True,timeout=90,check=True)
              return json.loads(p.stdout).get("entries") or []
            except Exception as e: return [{"error":str(e)}]
          out={}
          for key,qs in topics.items():
            seen={}
            for q in qs:
              for x in search(q):
                vid=x.get("id") or x.get("url")
                if not vid or len(vid)!=11: continue
                seen[vid]={"videoId":vid,"title":x.get("title"),"channel":x.get("channel") or x.get("uploader"),"duration":x.get("duration"),"views":x.get("view_count"),"url":f"https://www.youtube.com/watch?v={vid}"}
            rows=list(seen.values()); rows.sort(key=lambda r: (0 if (r.get("duration") or 99999)<1200 else 1,-(r.get("views") or 0)))
            out[key]=rows[:20]
          Path("research").mkdir(exist_ok=True)
          Path("research/two-english-weird-truths.json").write_text(json.dumps(out,indent=2)+"\n")
          PY
      - name: Commit
        run: |
          rm .github/workflows/find-two-english-weird-truths.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Record English weird truth candidates"
          git push origin simple-home-obscure-cases
