name: Run controlled transcript batch

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/run-controlled-transcript-batch.yml

permissions:
  contents: write

concurrency:
  group: controlled-transcript-batch
  cancel-in-progress: false

jobs:
  batch:
    runs-on: ubuntu-latest
    timeout-minutes: 18
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/exact-statement-clips
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install batch dependencies
        run: pip install "youtube-transcript-api>=1.2.0" "rapidfuzz>=3.9.0"
      - name: Fetch direct-line batch
        env:
          CASES: "L17,T03,T04,T08,T15"
          TRANSCRIPT_WORKERS: "2"
          TRANSCRIPT_TIMEOUT: "90"
          TRANSCRIPT_ATTEMPTS: "4"
        run: python scripts/run-transcript-line-batch.py
      - name: Save batch results
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add validation/problem-source-lines.json
          if ! git diff --cached --quiet; then
            git commit -m "Record controlled transcript batch seven"
            git push origin agent/exact-statement-clips
          fi
