name: Test ClarityClips transcript service

on:
  push:
    paths:
      - .github/workflows/test-clarityclips-transcripts.yml

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: exact-statement-windows
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Gradio client
        run: pip install -U gradio_client
      - name: Fetch timed transcripts
        run: |
          python <<'PY'
          import json
          from pathlib import Path
          from gradio_client import Client
          c=Client('ClarityClips/clarityclips-youtube-transcript',verbose=False)
          vids=['3MuPWV5cTio','K7iAlZzVenU','amHb2UoVZ_g','TM8EXwemnYA']
          out={}
          for vid in vids:
              row={}
              for fmt in ['JSON','WebVTT','SRT']:
                  try:
                      result=c.predict(video_id=vid,languages='en',format_type=fmt,translate_to='',preserve_formatting=False,api_name='/get_transcript')
                      row[fmt]={'ok':True,'type':type(result).__name__,'length':len(str(result)),'result':result}
                  except Exception as e:row[fmt]={'ok':False,'error':f'{type(e).__name__}: {e}'}
              try:row['available']=c.predict(video_id=vid,api_name='/list_available_transcripts')
              except Exception as e:row['availableError']=f'{type(e).__name__}: {e}'
              out[vid]=row
              print(vid,{k:v.get('ok') if isinstance(v,dict) else True for k,v in row.items()})
          Path('audit').mkdir(exist_ok=True);Path('audit/clarityclips-transcript-test.json').write_text(json.dumps(out,indent=2,ensure_ascii=False,default=str)+'\n')
          PY
      - name: Commit results
        run: |
          rm .github/workflows/test-clarityclips-transcripts.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Record ClarityClips transcript test"
          git pull --rebase origin exact-statement-windows
          git push origin exact-statement-windows
