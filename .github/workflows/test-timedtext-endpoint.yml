name: Test timedtext caption endpoint

on:
  push:
    paths:
      - .github/workflows/test-timedtext-endpoint.yml

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: exact-statement-windows
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Query timedtext variants
        run: |
          python <<'PY'
          import json,urllib.parse,urllib.request
          from pathlib import Path
          vids=['3MuPWV5cTio','K7iAlZzVenU','amHb2UoVZ_g']
          variants=[]
          for lang in ['en','en-US','en-GB']:
            for fmt in ['json3','vtt','srv3','ttml']:
              for kind in ['', 'asr']:
                variants.append({'lang':lang,'fmt':fmt,'kind':kind})
          out={}
          for vid in vids:
            rows=[]
            for x in variants:
              q={'v':vid,'lang':x['lang'],'fmt':x['fmt']}
              if x['kind']:q['kind']=x['kind']
              url='https://www.youtube.com/api/timedtext?'+urllib.parse.urlencode(q)
              try:
                req=urllib.request.Request(url,headers={'User-Agent':'Mozilla/5.0','Accept-Language':'en-US,en;q=0.9'})
                with urllib.request.urlopen(req,timeout=20) as r:data=r.read()
                if data: rows.append({**x,'status':r.status,'bytes':len(data),'contentType':r.headers.get('content-type'),'preview':data[:1000].decode('utf-8','replace')})
              except Exception as e:
                rows.append({**x,'error':f'{type(e).__name__}: {e}'})
            out[vid]=rows
          Path('audit').mkdir(exist_ok=True);Path('audit/timedtext-test.json').write_text(json.dumps(out,indent=2,ensure_ascii=False)+'\n')
          PY
      - name: Commit result
        run: |
          rm .github/workflows/test-timedtext-endpoint.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Record timedtext endpoint test"
          git pull --rebase origin exact-statement-windows
          git push origin exact-statement-windows
