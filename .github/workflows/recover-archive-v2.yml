name: Recover archived exact-statement sources v2

on:
  push:
    branches:
      - agent/verified-content-expansion
    paths:
      - .github/workflows/recover-archive-v2.yml
      - scripts/recover-archive-sources.py
      - archive-recovery-trigger.txt

permissions:
  contents: write

concurrency:
  group: falsology-archive-recovery-v2
  cancel-in-progress: true

jobs:
  recover:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/verified-content-expansion
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install source tools
        run: python -m pip install --upgrade yt-dlp requests
      - name: Recover unique exact-quote uploads
        run: python scripts/recover-archive-sources.py
      - name: Save recovered sources
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/research/archive-source-recovery.json data/recovered-archive-overrides.json
          if ! git diff --cached --quiet; then
            git commit -m "Recover unique archive video sources with current captions"
            git push origin agent/verified-content-expansion
          fi
