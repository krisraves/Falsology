name: PR probe Filmot timestamps

on:
  pull_request:
    branches: [main]

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Query subtitle index through Jina Reader
        run: |
          python <<'PY'
          import json,re,urllib.parse,urllib.request
          from pathlib import Path
          queries=[
            'I did not have sexual relations with that woman',
            'I have no inclination where they are',
            'Intruders tied me up and attacked my parents',
            'A humpback whale had me inside its mouth and spit me back out',
          ]
          out={}
          for q in queries:
            target='http://filmot.com/search/'+urllib.parse.quote(q,safe='')+'/1/1?gridView=1'
            url='https://r.jina.ai/'+target
            row={'target':target,'jinaUrl':url}
            try:
              req=urllib.request.Request(url,headers={'User-Agent':'Mozilla/5.0','X-Return-Format':'markdown','X-Engine':'browser','X-Timeout':'60'})
              with urllib.request.urlopen(req,timeout=90) as r:text=r.read().decode('utf-8','replace')
              row['status']=r.status;row['length']=len(text);row['text']=text[:200000]
              row['youtubeLinks']=re.findall(r'https?://(?:www\.)?youtube\.com/watch\?v=[A-Za-z0-9_-]{11}[^\s)\]"<>]*',text)
              row['timestampLinks']=[x for x in row['youtubeLinks'] if re.search(r'[?&](?:t|start)=\d+',x)]
              row['videoIds']=list(dict.fromkeys(re.findall(r'(?:youtube\.com/watch\?v=|youtu\.be/)([A-Za-z0-9_-]{11})',text)))
            except Exception as e:row['error']=f'{type(e).__name__}: {e}'
            out[q]=row
          Path('probe-output').mkdir(exist_ok=True);Path('probe-output/filmot.json').write_text(json.dumps(out,indent=2,ensure_ascii=False)+'\n')
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: filmot-probe-result
          path: probe-output/filmot.json
          retention-days: 1
