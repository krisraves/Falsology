name: PR probe Filmot timestamps

on:
  pull_request:
    branches: [main]

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Playwright
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium
      - name: Open Filmot in a browser
        run: |
          node <<'NODE'
          const {chromium}=require('playwright');const fs=require('fs');
          (async()=>{
            const q='I did not have sexual relations with that woman';
            const url='https://filmot.com/search/'+encodeURIComponent(q)+'/1/1?gridView=1';
            const browser=await chromium.launch({headless:true,args:['--disable-blink-features=AutomationControlled','--disable-dev-shm-usage','--no-sandbox']});
            const context=await browser.newContext({locale:'en-US',timezoneId:'America/New_York',viewport:{width:1440,height:900},userAgent:'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/140.0.0.0 Safari/537.36'});
            await context.addInitScript(()=>{Object.defineProperty(navigator,'webdriver',{get:()=>undefined});Object.defineProperty(navigator,'languages',{get:()=>['en-US','en']});Object.defineProperty(navigator,'plugins',{get:()=>[1,2,3,4,5]})});
            const page=await context.newPage();const logs=[];page.on('console',m=>logs.push({type:m.type(),text:m.text()}));
            let error=null;try{await page.goto(url,{waitUntil:'domcontentloaded',timeout:60000})}catch(e){error=String(e)}
            const states=[];
            for(let i=0;i<8;i++){await page.waitForTimeout(5000);states.push({i,url:page.url(),title:await page.title(),body:(await page.locator('body').innerText().catch(()=>'' )).slice(0,3000),htmlLength:(await page.content()).length})}
            const html=await page.content();const result={requestedUrl:url,error,states,finalUrl:page.url(),title:await page.title(),htmlLength:html.length,windowResults:/window\.results\s*=/.test(html),resultSnippet:(html.match(/window\.results\s*=\s*(\{[\s\S]{0,100000}?\});/)||[])[1]||null,html:html.slice(0,250000),cookies:await context.cookies(),logs};
            fs.mkdirSync('probe-output',{recursive:true});fs.writeFileSync('probe-output/filmot.json',JSON.stringify(result,null,2));await browser.close();
          })().catch(e=>{console.error(e);process.exit(1)});
          NODE
      - uses: actions/upload-artifact@v4
        with:
          name: filmot-probe-result
          path: probe-output/filmot.json
          retention-days: 1
