name: Probe replacement source transcripts

on:
  pull_request:
    branches:
      - main
    types:
      - opened

concurrency:
  group: replacement-source-transcript-probe
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/replacement-source-probe
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Probe replacement videos
        run: python scripts/probe-replacement-sources.py
      - name: Save probe results
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add validation/replacement-source-transcripts.json
          if ! git diff --cached --quiet; then
            git commit -m "Record replacement source transcripts"
            git push origin agent/replacement-source-probe
          fi
