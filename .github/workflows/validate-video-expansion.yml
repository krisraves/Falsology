name: Validate 300-video expansion

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

concurrency:
  group: falsology-video-expansion
  cancel-in-progress: true

jobs:
  discover-and-validate:
    if: github.head_ref == 'agent/three-hundred-video-decks'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/three-hundred-video-decks
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install discovery tools
        run: python -m pip install --upgrade yt-dlp

      - name: Confirm or discover 100 unique candidates per difficulty
        id: discovery
        continue-on-error: true
        shell: bash
        run: |
          set +e
          if [ -f data/research/video-candidates.json ] && \
             python - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path("data/research/video-candidates.json").read_text())
          counts = data.get("counts", {})
          candidates = data.get("candidates", {})
          ids = [item["videoId"] for level in ("easy", "hard", "expert") for item in candidates.get(level, [])]
          valid = all(counts.get(level) == 100 and len(candidates.get(level, [])) == 100 for level in ("easy", "hard", "expert"))
          valid = valid and len(ids) == 300 and len(set(ids)) == 300
          raise SystemExit(0 if valid else 1)
          PY
          then
            echo "Existing 300-video research pool is complete and unique."
            code=0
          else
            python scripts/find-video-candidates.py
            code=$?
          fi
          set -e
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"

      - name: Validate application
        id: application
        continue-on-error: true
        shell: bash
        run: |
          set +e
          npm ci
          code=$?
          if [ "$code" -eq 0 ]; then npm run lint; code=$?; fi
          if [ "$code" -eq 0 ]; then npm run typecheck; code=$?; fi
          if [ "$code" -eq 0 ]; then npm run build; code=$?; fi
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Commit research pool
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/research/video-candidates.json || true
          if ! git diff --cached --quiet; then
            git commit -m "Record 300-video difficulty research pool"
            git push origin agent/three-hundred-video-decks
          fi
          if [ "${{ steps.discovery.outputs.exit_code }}" != "0" ] || [ "${{ steps.application.outputs.exit_code }}" != "0" ]; then
            exit 1
          fi
