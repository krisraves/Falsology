name: Validate 300-video expansion

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

concurrency:
  group: falsology-video-expansion
  cancel-in-progress: true

jobs:
  discover-and-validate:
    if: github.head_ref == 'agent/three-hundred-video-decks'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/three-hundred-video-decks
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install discovery tools
        run: python -m pip install --upgrade yt-dlp

      - name: Discover 100 unique candidates per difficulty
        id: discovery
        continue-on-error: true
        shell: bash
        run: |
          set +e
          python scripts/find-video-candidates.py
          code=$?
          set -e
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"

      - name: Validate application
        id: application
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p validation
          set +e
          npm ci 2>&1 | tee validation/video-expansion-build.log
          code=${PIPESTATUS[0]}
          if [ "$code" -eq 0 ]; then npm run lint 2>&1 | tee -a validation/video-expansion-build.log; code=${PIPESTATUS[0]}; fi
          if [ "$code" -eq 0 ]; then npm run typecheck 2>&1 | tee -a validation/video-expansion-build.log; code=${PIPESTATUS[0]}; fi
          if [ "$code" -eq 0 ]; then npm run build 2>&1 | tee -a validation/video-expansion-build.log; code=${PIPESTATUS[0]}; fi
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Commit research pool or diagnostics
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/research/video-candidates.json validation/video-expansion-build.log || true
          if ! git diff --cached --quiet; then
            git commit -m "Record video expansion research and validation"
            git push origin agent/three-hundred-video-decks
          fi
          if [ "${{ steps.discovery.outputs.exit_code }}" != "0" ] || [ "${{ steps.application.outputs.exit_code }}" != "0" ]; then
            exit 1
          fi
