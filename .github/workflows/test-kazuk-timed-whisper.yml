name: Test running timed Whisper service

on:
  push:
    paths:
      - .github/workflows/test-kazuk-timed-whisper.yml

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
        with:
          ref: exact-statement-windows
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Gradio client
        run: pip install -U gradio_client
      - name: Transcribe one short source
        run: |
          python <<'PY'
          import json,multiprocessing as mp
          from pathlib import Path
          def work(q):
              try:
                  from gradio_client import Client
                  c=Client('kazuk/youtube-whisper-14',verbose=False)
                  api=c.view_api(return_format='dict',print_info=False)
                  result=c.predict('https://www.youtube.com/watch?v=TM8EXwemnYA','tiny.en','English','.srt',api_name='/get_transcript')
                  q.put({'ok':True,'api':api,'result':result,'type':type(result).__name__})
              except Exception as e:q.put({'ok':False,'error':f'{type(e).__name__}: {e}'})
          q=mp.Queue();p=mp.Process(target=work,args=(q,));p.start();p.join(480)
          if p.is_alive():p.terminate();p.join();out={'ok':False,'error':'hard timeout after 480 seconds'}
          else:out=q.get() if not q.empty() else {'ok':False,'error':f'worker exited {p.exitcode} without result'}
          Path('audit').mkdir(exist_ok=True);Path('audit/kazuk-timed-whisper-test.json').write_text(json.dumps(out,indent=2,ensure_ascii=False,default=str)+'\n')
          PY
      - name: Commit result
        run: |
          rm .github/workflows/test-kazuk-timed-whisper.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Record timed Whisper service test"
          git pull --rebase origin exact-statement-windows
          git push origin exact-statement-windows
