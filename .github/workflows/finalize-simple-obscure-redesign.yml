name: Finalize simple obscure redesign

on:
  push:
    paths:
      - .github/workflows/finalize-simple-obscure-redesign.yml

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: simple-home-obscure-cases
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Clean research files
        run: |
          rm -rf research
          rm -f docs/homepage-redesign-plan.md
          rm .github/workflows/finalize-simple-obscure-redesign.yml
      - name: Install dependencies
        run: npm ci
      - name: Validate cases
        run: npm run validate:cases
      - name: Lint
        run: npm run lint
      - name: Type check
        run: npm run typecheck
      - name: Production build
        run: npm run build
      - name: Commit verified tree
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Finalize simple randomized difficulty redesign"
          git push origin simple-home-obscure-cases
