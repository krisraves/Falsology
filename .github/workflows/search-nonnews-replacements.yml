name: Search non-news replacements

on:
  push:
    paths:
      - .github/workflows/search-nonnews-replacements.yml

permissions:
  contents: write

jobs:
  search:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: direct-footage-audit
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -U yt-dlp
      - name: Search non-news direct recordings
        shell: bash
        run: |
          python <<'PY'
          import concurrent.futures, json, re, subprocess
          from pathlib import Path

          targets={
            'L01':('Chris Watts','I have no inclination where they are','porch interview raw full unedited'),
            'L02':('Susan Smith','a man carjacked me took my boys','public plea raw original'),
            'L08':('Stephen McDaniel','I do not know what happened to Lauren','original interview raw body found'),
            'L13':('Lance Armstrong','I have never doped','original denial interview raw'),
            'L14':('Marion Jones','I have never used performance enhancing drugs','original denial interview raw'),
            'L17':('Kenneth Lay','company fundamentally strong','original employee address statement'),
            'L19':('Ryan Lochte','robbed at gunpoint men posing as police','original direct interview full'),
            'L25':('Jussie Smollett','I did not stage this attack','full direct Robin Roberts interview'),
            'T05':('Russell Williams','I killed Jessica Lloyd','police interrogation confession raw'),
            'T06':('Chris Watts','I killed Shanann','police interrogation confession raw unedited'),
            'T07':('Jodi Arias','yes I killed Travis','court testimony raw unedited'),
            'T08':('Alex Murdaugh','I lied about being at the kennels','court testimony raw'),
            'T09':('Richard Jewell','I did not plant the Olympic Park bomb','press conference raw full'),
            'T10':('Lindy Chamberlain','a dingo took my baby','direct interview full original'),
            'T11':('Kirk Bloodsworth','DNA proved I did not commit murder','direct speech interview full'),
            'T12':('Anthony Ray Hinton','thirty years death row crime I did not commit','direct speech interview'),
            'T13':('Elizabeth Smart','held captive for nine months','full direct interview'),
            'T19':('Robert Downey Jr','addiction led to prison','full direct interview'),
            'T21':('Mark Wahlberg','went to jail assault teenager','full direct interview pardon'),
            'T23':('Jordan Belfort','committed securities fraud money laundering','full direct interview confession'),
          }
          blocked=['abc','associated press','ap archive','bbc','bloomberg','cbs','cnbc','cnn','denver7','entertainment tonight','extra','fox','good morning america','inside edition','nbc','news','post','reuters','today','usa today','wesh','wcvb','wxyz','wptv','wplg','wmar','wlwt','wgxa','wfmh','al.com','daily mail','forbes','yahoo','business insider','the hill','ktvu','wclj','wltx','11alive','national post','independent','60 minutes','telegraph video','glamour']
          direct=['raw','unedited','full interview','interrogation','confession','testimony','courtroom','press conference','original','archive','hearing','statement','deposition']
          bad=['reaction','reacts','analysis','breakdown','documentary','explained','news report','trailer','movie','reenactment','body language','story of','case update']
          def norm(x):return re.sub(r'[^a-z0-9 ]+',' ',(x or '').lower())
          def run_search(query):
            try:
              p=subprocess.run(['yt-dlp','--dump-single-json','--flat-playlist',f'ytsearch25:{query}'],capture_output=True,text=True,timeout=120,check=True)
              return json.loads(p.stdout).get('entries') or []
            except Exception as e:return [{'error':f'{type(e).__name__}: {e}','query':query}]
          def process(item):
            key,(person,claim,kind)=item
            queries=[f'"{claim}" "{person}"',f'{person} {claim} {kind}',f'{person} {kind}']
            rows=[];seen=set();errors=[]
            with concurrent.futures.ThreadPoolExecutor(max_workers=3) as ex:
              sets=list(ex.map(run_search,queries))
            for entries in sets:
              for e in entries:
                if e.get('error'):errors.append(e);continue
                vid=e.get('id') or e.get('url');
                if not vid or len(vid)!=11 or vid in seen:continue
                seen.add(vid)
                title=e.get('title') or ''; channel=e.get('channel') or e.get('uploader') or ''; duration=e.get('duration') or 999999
                n=norm(channel+' '+title)
                news=[b for b in blocked if b in n]
                score=(50 if duration<=45 else 20 if duration<=180 else 5 if duration<=1200 else 0)
                score+=sum(8 for d in direct if d in norm(title))
                score-=sum(40 for b in news)
                score-=sum(30 for b in bad if b in norm(title))
                score+=20 if norm(person) in norm(title) else 0
                rows.append({'videoId':vid,'title':title,'channel':channel,'duration':duration,'newsTerms':news,'score':score,'url':'https://www.youtube.com/watch?v='+vid})
            rows.sort(key=lambda r:(-r['score'],r['duration']))
            return key,{'person':person,'claim':claim,'queries':queries,'results':rows[:18],'errors':errors[:3]}
          out={}
          with concurrent.futures.ThreadPoolExecutor(max_workers=5) as ex:
            for key,result in ex.map(process,targets.items()):out[key]=result
          Path('audit/nonnews-replacements.json').write_text(json.dumps(out,indent=2,ensure_ascii=False)+'\n')
          PY
      - name: Commit results
        run: |
          rm .github/workflows/search-nonnews-replacements.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Record non-news replacement candidates"
          git push origin direct-footage-audit
