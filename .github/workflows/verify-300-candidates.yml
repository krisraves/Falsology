name: Verify 300 candidate videos

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

concurrency:
  group: falsology-verify-300-candidates
  cancel-in-progress: true

jobs:
  verify:
    if: github.head_ref == 'agent/verify-300-videos'
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/verify-300-videos
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install verification tools
        run: python -m pip install --upgrade yt-dlp requests

      - name: Verify all candidates
        shell: bash
        run: |
          if [ -f data/research/video-verification-report.json ] && python - <<'PY'
          import json
          from pathlib import Path
          report = json.loads(Path("data/research/video-verification-report.json").read_text())
          valid = report.get("candidateCount") == 300 and len(report.get("results", [])) == 300
          raise SystemExit(0 if valid else 1)
          PY
          then
            echo "Existing 300-candidate verification report is complete."
          else
            python scripts/verify-video-candidates.py
          fi

      - name: Commit verification results
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/research/video-verification-report.json data/research/verified-video-candidates.json data/research/video-verification-summary.md
          if ! git diff --cached --quiet; then
            git commit -m "Verify 300 video candidates"
            git push origin agent/verify-300-videos
          fi
