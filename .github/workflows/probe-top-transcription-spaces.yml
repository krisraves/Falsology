name: Probe top transcription spaces

on:
  push:
    paths:
      - .github/workflows/probe-top-transcription-spaces.yml

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: exact-statement-windows
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Gradio client
        run: pip install -U gradio_client
      - name: Inspect top APIs
        run: |
          python <<'PY'
          import concurrent.futures,json
          from pathlib import Path
          from gradio_client import Client
          ids=[
            'Divyanshuinfo/youtube-video-transcription-with-whisper',
            'neillk/youtube-whisper',
            'neuralworm/youtube-transcription-whisper',
            '1s/YouTube-Video-Transcription',
            'hesham111/whisper-transcription-api-youtube',
            'ClarityClips/clarityclips-youtube-transcript',
            'GhadaSaylami/free-fast-youtube-url-video-to-text-using-openai-whisper',
            'Hamza4100/ai-video-transcription-clip-extractor',
            'BEACON849322/youtube-subtitle-api',
            'Docfile/Whisper-youtube-crosslingual-subtitles',
            'Jahankhan01/Youtube-Transcription',
            'RASMUS/Youtube-videos-with-crosslingual-transcriptions',
          ]
          def inspect(sid):
              row={'id':sid}
              try:
                  c=Client(sid,verbose=False); row['src']=c.src; row['api']=c.view_api(return_format='dict',print_info=False); row['config']=getattr(c,'config',None)
              except Exception as e:row['error']=f'{type(e).__name__}: {e}'
              return row
          with concurrent.futures.ThreadPoolExecutor(max_workers=6) as ex:out=list(ex.map(inspect,ids))
          Path('audit').mkdir(exist_ok=True);Path('audit/top-transcription-space-apis.json').write_text(json.dumps(out,indent=2,ensure_ascii=False,default=str)+'\n')
          PY
      - name: Commit results
        run: |
          rm .github/workflows/probe-top-transcription-spaces.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Record top transcription Space APIs"
          git pull --rebase origin exact-statement-windows
          git push origin exact-statement-windows
