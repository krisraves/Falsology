name: Probe current timed transcript providers

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  probe:
    if: github.head_ref == 'agent/current-transcript-probe'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/current-transcript-probe
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install probe tools
        run: python -m pip install --upgrade requests youtube-transcript-api
      - name: Probe providers
        run: python scripts/probe-current-transcript-providers.py
      - name: Save probe
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/research/current-transcript-provider-probe.json
          if ! git diff --cached --quiet; then
            git commit -m "Record current transcript provider probe"
            git push origin agent/current-transcript-probe
          fi
