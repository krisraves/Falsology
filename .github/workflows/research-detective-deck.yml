name: Research detective deck

on:
  push:
    paths:
      - .github/workflows/research-detective-deck.yml

permissions:
  contents: write

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install search tool
        run: pip install -q yt-dlp
      - name: Find candidate footage
        shell: bash
        run: |
          python <<'PY'
          import concurrent.futures, json, subprocess, time
          from pathlib import Path

          queries = {
            "L01": "Chris Watts interview I have no inclination where they're at porch",
            "L02": "Susan Smith press conference carjacked children original footage",
            "L03": "Diane Downs interview stranger shot my children original",
            "L04": "Jodi Arias police interrogation I wasn't there Travis",
            "L05": "Casey Anthony interrogation Zanny nanny took Caylee",
            "L06": "Alex Murdaugh interview I was not at kennels original",
            "L07": "Ted Bundy interview I am innocent original footage",
            "L08": "John Wayne Gacy interview I killed nobody",
            "L09": "Stephen McDaniel interview Lauren Giddings I don't know what happened",
            "L10": "Jennifer Pan police interrogation intruders original",
            "L11": "Stephanie Lazarus interrogation denies knowing Sherri Rasmussen",
            "L12": "Sam Bankman Fried interview did not misuse customer funds",
            "L13": "Elizabeth Holmes interview Theranos tiny drop blood tests claim",
            "L14": "Trevor Milton Nikola One fully functioning original claim",
            "L15": "Bernie Madoff impossible for violation to go undetected interview",
            "L16": "Lance Armstrong I have never doped original interview denial",
            "L17": "Marion Jones I have never used steroids interview denial",
            "L18": "Pete Rose I never bet on baseball original interview",
            "L19": "Bill Clinton I did not have sexual relations original statement",
            "L20": "George Santos worked at Goldman Sachs original claim interview",
            "L21": "Brian Williams helicopter hit RPG original story",
            "L22": "Ryan Lochte robbed at gunpoint original interview Rio",
            "L23": "Balloon Boy father not a hoax original interview",
            "L24": "Billy McFarland Fyre Festival luxury villas promotional interview",
            "L25": "tobacco CEOs nicotine not addictive Congress original footage",

            "T01": "Dennis Rader BTK courtroom confession guilty plea",
            "T02": "Gary Ridgway courtroom guilty plea 48 murders",
            "T03": "Jeffrey Dahmer interview admits killed 17",
            "T04": "Ed Kemper interview killed mother confession",
            "T05": "Aileen Wuornos interview I killed seven men",
            "T06": "Russell Williams interrogation confession original",
            "T07": "Chris Watts confession killed family interrogation",
            "T08": "Stephen McDaniel guilty plea confession Lauren Giddings courtroom",
            "T09": "Jodi Arias admits I killed Travis Alexander interview",
            "T10": "Alex Murdaugh admits lied about kennels testimony",
            "T11": "Sammy Gravano interview admits 19 murders",
            "T12": "Henry Hill interview admits mob informant crimes",
            "T13": "Jordan Belfort interview admits stock fraud",
            "T14": "Frank Lucas interview admits heroin trafficking",
            "T15": "Michael Franzese interview gas tax scam confession",
            "T16": "Richard Jewell interview I did not bomb Olympics",
            "T17": "Lindy Chamberlain interview dingo took my baby",
            "T18": "Kirk Bloodsworth interview DNA proved innocence",
            "T19": "Anthony Ray Hinton interview innocent 30 years death row",
            "T20": "Elizabeth Smart interview kidnapped held nine months",
            "T21": "Jaycee Dugard interview held captive 18 years",
            "T22": "Mary Vincent interview arms cut off survived",
            "T23": "Aron Ralston interview cut off my arm",
            "T24": "Danny Trejo interview prison before acting",
            "T25": "Tim Allen interview prison cocaine trafficking",
          }

          def search(item):
            key, query = item
            cmd = ["yt-dlp", "--flat-playlist", "--dump-single-json", "--playlist-end", "12", f"ytsearch12:{query}"]
            try:
              raw = subprocess.check_output(cmd, text=True, stderr=subprocess.STDOUT, timeout=90)
              data = json.loads(raw)
              out = []
              for entry in data.get("entries") or []:
                out.append({
                  "id": entry.get("id"),
                  "title": entry.get("title"),
                  "channel": entry.get("channel") or entry.get("uploader"),
                  "duration": entry.get("duration"),
                  "url": f"https://www.youtube.com/watch?v={entry.get('id')}" if entry.get("id") else None,
                  "viewCount": entry.get("view_count"),
                })
              return key, {"query": query, "results": out, "error": None}
            except Exception as exc:
              return key, {"query": query, "results": [], "error": str(exc)}

          results = {}
          with concurrent.futures.ThreadPoolExecutor(max_workers=5) as pool:
            for key, result in pool.map(search, queries.items()):
              results[key] = result
              print(key, len(result["results"]), result["error"] or "")

          Path("research").mkdir(exist_ok=True)
          Path("research/detective-video-candidates.json").write_text(json.dumps({
            "generatedAt": time.strftime('%Y-%m-%dT%H:%M:%SZ', time.gmtime()),
            "queries": results,
          }, indent=2, ensure_ascii=False) + "\n")
          PY
      - name: Commit candidate list
        shell: bash
        run: |
          rm .github/workflows/research-detective-deck.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Collect detective deck video candidates"
          git push