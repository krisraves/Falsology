name: Research weird English cases

on:
  push:
    paths:
      - .github/workflows/research-weird-english-cases.yml

permissions:
  contents: write

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: simple-home-obscure-cases
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -U yt-dlp
      - name: Search candidates
        shell: bash
        run: |
          python <<'PY'
          import json, subprocess
          from pathlib import Path

          topics = {
            "T_PAUL_TEMPLER": [
              "Paul Templer direct interview hippo swallowed arm survivor",
              "Paul Templer tells hippo attack story interview",
            ],
            "T_MICHAEL_PACKARD": [
              "Michael Packard direct interview swallowed by whale",
              "lobster diver swallowed by whale tells story interview",
            ],
            "T_TRUMAN_DUNCAN": [
              "Truman Duncan direct interview cut in half train survived",
              "Truman Duncan tells survival story interview",
            ],
            "T_MAURO_PROSPERI": [
              "Mauro Prosperi direct interview lost Sahara survived nine days",
              "Mauro Prosperi tells survival story interview English",
            ],
            "T_JOE_SIMPSON": [
              "Joe Simpson direct interview Touching the Void crawled broken leg",
              "Joe Simpson tells survival story interview",
            ],
            "T_BECK_WEATHERS": [
              "Beck Weathers direct interview left for dead Everest survived",
              "Beck Weathers tells story interview Everest",
            ],
            "T_STEVEN_CALLAHAN": [
              "Steven Callahan direct interview 76 days adrift survived",
              "Steven Callahan tells survival story interview",
            ],
            "T_JOAN_MURRAY": [
              "Joan Murray direct interview survived 14500 foot fall fire ants",
              "Joan Murray skydiver survival interview",
            ],
            "T_ANN_HODGES": [
              "Ann Hodges interview hit by meteorite original footage",
              "meteorite hit woman direct interview Ann Hodges",
            ],
            "T_RICKY_MEGEE": [
              "Ricky Megee direct English interview survived 71 days outback",
              "Ricky Megee full interview English",
            ],
            "L_SARAH_BOONE_SHORT": [
              "Sarah Boone says hide and seek suitcase direct interrogation clip",
              "Sarah Boone it was not intentional interrogation clip",
            ],
            "L_STEPHANIE_LAZARUS_SHORT": [
              "Stephanie Lazarus gosh I don't know direct interrogation clip",
              "Stephanie Lazarus barely knew Sherri interrogation clip",
            ],
            "L_JENNIFER_PAN_SHORT": [
              "Jennifer Pan says intruders tied me up police interview clip",
              "Jennifer Pan first interrogation direct clip",
            ],
            "L_SHERRI_PAPINI_SHORT": [
              "Sherri Papini says two women kidnapped me interrogation clip",
              "Sherri Papini direct FBI interrogation kidnapping story clip",
            ],
            "L_DALIA_DIPPOLITO_SHORT": [
              "Dalia Dippolito says it was acting direct interrogation clip",
              "Dalia Dippolito direct undercover recording clip",
            ],
            "L_CHANDLER_HALDERSON_SHORT": [
              "Chandler Halderson says parents went to cabin interrogation clip",
              "Chandler Halderson direct police interview clip",
            ],
            "L_GRANT_AMATO_SHORT": [
              "Grant Amato says I did not kill my family interrogation clip",
              "Grant Amato direct interrogation clip",
            ],
            "L_JENNIFER_FAITH_SHORT": [
              "Jennifer Faith direct interview stranger killed husband clip",
              "Jennifer Faith public appeal direct clip",
            ],
            "L_NICHOLAS_ALAHVERDIAN": [
              "Nicholas Alahverdian Arthur Knight direct interview not fugitive",
              "Arthur Knight interview I am not Nicholas Rossi",
            ],
            "L_RUSSELL_CAUSLEY": [
              "Russell Causley parole hearing denies murder direct testimony",
              "Russell Causley interview direct denial wife murder",
            ],
          }

          def search(query):
              try:
                  proc = subprocess.run(
                      ["yt-dlp", "--dump-single-json", "--flat-playlist", f"ytsearch25:{query}"],
                      capture_output=True, text=True, timeout=100, check=True,
                  )
                  return json.loads(proc.stdout).get("entries") or []
              except Exception as exc:
                  return [{"error": f"{type(exc).__name__}: {exc}"}]

          output = {}
          for key, queries in topics.items():
              seen, errors = {}, []
              for query in queries:
                  for item in search(query):
                      if item.get("error"):
                          errors.append(item["error"])
                          continue
                      video_id = item.get("id") or item.get("url")
                      if not video_id or len(video_id) != 11:
                          continue
                      row = {
                          "videoId": video_id,
                          "title": item.get("title"),
                          "channel": item.get("channel") or item.get("uploader"),
                          "duration": item.get("duration"),
                          "viewCount": item.get("view_count"),
                          "url": f"https://www.youtube.com/watch?v={video_id}",
                      }
                      seen[video_id] = row
              rows = list(seen.values())
              rows.sort(key=lambda r: (0 if (r.get("duration") or 99999) <= 900 else 1, -(r.get("viewCount") or 0)))
              output[key] = {"queries": queries, "results": rows[:30], "errors": errors[:3]}
              print(key, len(rows))

          Path("research").mkdir(exist_ok=True)
          Path("research/weird-english-candidates.json").write_text(json.dumps(output, indent=2, ensure_ascii=False) + "\n")
          PY
      - name: Commit results
        run: |
          rm .github/workflows/research-weird-english-cases.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Collect weird English direct-footage candidates"
          git push origin simple-home-obscure-cases
