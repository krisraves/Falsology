name: Generate exact statement candidate review

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/run-exact-statement-audit.yml
  pull_request:
    branches:
      - main
    types:
      - opened

concurrency:
  group: exact-statement-candidate-review
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/exact-statement-clips
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install review dependencies
        run: pip install "youtube-transcript-api>=1.2.0" "rapidfuzz>=3.9.0"

      - name: Generate exact spoken candidate passages
        id: candidates
        continue-on-error: true
        env:
          CANDIDATE_WORKERS: "30"
          CANDIDATE_TIMEOUT: "45"
        shell: bash
        run: |
          code=2
          for round in 1 2 3 4; do
            echo "Candidate generation round $round"
            set +e
            python scripts/generate-statement-candidate-review.py
            code=$?
            set -e
            if [ "$code" -eq 0 ]; then
              break
            fi
            sleep $((round * 5))
          done
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Save candidate review
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add validation/statement-candidate-review.json
          if ! git diff --cached --quiet; then
            git commit -m "Record exact statement candidate review"
            git push origin agent/exact-statement-clips
          fi
          if [ "${{ steps.candidates.outputs.exit_code }}" != "0" ]; then
            exit 1
          fi
