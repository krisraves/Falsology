name: Run exact statement timestamp audit

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/run-exact-statement-audit.yml
  pull_request:
    branches:
      - main
    types:
      - opened

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/exact-statement-clips
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install timestamp audit tools
        run: pip install "youtube-transcript-api>=1.2.0" "rapidfuzz>=3.9.0"

      - name: Match statements and generate exact windows
        id: audit
        continue-on-error: true
        shell: bash
        run: |
          sed -i 's/for attempt in range(3):/for attempt in range(1):/' scripts/audit-exact-statement-clips.py
          sed -i 's/time.sleep(0.8)/time.sleep(0.05)/' scripts/audit-exact-statement-clips.py
          set +e
          python scripts/audit-exact-statement-clips.py
          code=$?
          set -e
          git checkout -- scripts/audit-exact-statement-clips.py
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"

      - name: Persist failed-case report
        if: steps.audit.outputs.exit_code != '0'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add validation/exact-statement-audit.json
          git commit -m "Record failed exact statement audit"
          git push origin agent/exact-statement-clips
          exit 1

      - name: Verify application
        if: steps.audit.outputs.exit_code == '0'
        run: |
          npm ci
          npm run lint
          npm run typecheck
          npm run build

      - name: Commit audited production data
        if: steps.audit.outputs.exit_code == '0'
        shell: bash
        run: |
          rm -f .github/workflows/audit-exact-statement-clips.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No new audited changes to commit."
          else
            git commit -m "Use exact statement-centered clip windows"
            git push origin agent/exact-statement-clips
          fi

      - name: Remove temporary trigger from main
        if: github.event_name == 'push' && steps.audit.outputs.exit_code == '0'
        shell: bash
        run: |
          git fetch origin main
          git checkout main
          git pull --ff-only origin main
          rm .github/workflows/run-exact-statement-audit.yml
          git add .github/workflows/run-exact-statement-audit.yml
          git commit -m "Remove exact statement audit trigger"
          git push origin main
