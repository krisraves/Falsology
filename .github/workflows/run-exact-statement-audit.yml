name: Run exact statement timestamp audit

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/run-exact-statement-audit.yml
  pull_request:
    branches:
      - main
    types:
      - opened
      - ready_for_review

concurrency:
  group: exact-statement-audit
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/exact-statement-clips
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Probe independent caption providers
        run: python scripts/probe-caption-mirrors.py
