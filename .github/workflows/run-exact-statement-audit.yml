name: Run exact statement timestamp audit

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/run-exact-statement-audit.yml
  pull_request:
    branches:
      - main
    types:
      - opened

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/exact-statement-clips
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install timestamp audit tools
        run: pip install "youtube-transcript-api>=1.2.0" "rapidfuzz>=3.9.0"

      - name: Match statements and generate exact windows
        run: python scripts/audit-exact-statement-clips.py

      - name: Verify application
        run: |
          npm ci
          npm run lint
          npm run typecheck
          npm run build

      - name: Commit audited production data
        shell: bash
        run: |
          rm -f .github/workflows/audit-exact-statement-clips.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No new audited changes to commit."
          else
            git commit -m "Use exact statement-centered clip windows"
            git push origin agent/exact-statement-clips
          fi

      - name: Remove temporary trigger from main
        if: github.event_name == 'push'
        shell: bash
        run: |
          git fetch origin main
          git checkout main
          git pull --ff-only origin main
          rm .github/workflows/run-exact-statement-audit.yml
          git add .github/workflows/run-exact-statement-audit.yml
          git commit -m "Remove exact statement audit trigger"
          git push origin main
