name: Run exact statement timestamp audit

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/run-exact-statement-audit.yml
  pull_request:
    branches:
      - main
    types:
      - opened

concurrency:
  group: exact-statement-audit
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/exact-statement-clips
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Probe independent caption providers
        run: python scripts/probe-caption-mirrors.py
      - name: Save probe results
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add validation/caption-provider-probe.json
          if ! git diff --cached --quiet; then
            git commit -m "Record caption provider probe"
            git push origin agent/exact-statement-clips
          fi
