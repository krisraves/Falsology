name: Recover unique archive video sources

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  recover:
    if: github.head_ref == 'agent/verified-content-expansion'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/verified-content-expansion
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install source tools
        run: python -m pip install --upgrade yt-dlp requests
      - name: Search for unique exact-quote sources
        run: python scripts/recover-archive-sources.py
      - name: Save recovery report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/research/archive-source-recovery.json
          if ! git diff --cached --quiet; then
            git commit -m "Audit alternate sources for archived cases"
            git push origin agent/verified-content-expansion
          fi
