name: Refine video candidates

on:
  push:
    paths:
      - .github/workflows/refine-video-candidates.yml

permissions:
  contents: write

jobs:
  search:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade yt-dlp
      - name: Search refined queries
        shell: bash
        run: |
          python <<'PY'
          import concurrent.futures, json, subprocess, time
          from pathlib import Path

          queries = [
            ("T04R", "BBC News wombat cube shaped poop"),
            ("T06R", "Smithsonian polar bear black skin"),
            ("T08R", "ESA tardigrades survive space"),
            ("T09R", "NASA Saturn less dense than water float"),
            ("T10R", "NOAA lightning hotter than sun surface"),
            ("T11R", "weather channel cloud million pounds"),
            ("T13R", "Eiffel Tower official grows summer heat"),
            ("T15R", "Oxford University older than Aztec Empire history"),
            ("T20R", "BBC dolphins signature whistles names"),
            ("T21R", "Smithsonian mantis shrimp punch cavitation light"),
            ("T23R", "Australian Museum turtles breathe cloaca"),
            ("T24R", "Smithsonian why honey never spoils"),
            ("T25R", "Royal Institution water triple point boil freeze"),
            ("L03R", "Lance Armstrong I have never doped original interview denial"),
            ("L09R", "Pete Rose I never bet on baseball original interview denial"),
            ("L10R", "Marion Jones I have never used steroids original interview"),
            ("L11R", "Ryan Lochte gun held to forehead original interview"),
            ("L15R", "Brian Williams helicopter hit RPG original interview claim"),
            ("L16R", "Hillary Clinton landed under sniper fire Bosnia speech"),
            ("L17R", "Steve Rannazzisi 9/11 story interview Merrill Lynch"),
            ("L19R", "Alex Jones Sandy Hook fake with actors original clip"),
            ("L20R", "Rudy Giuliani Dominion voting machines press conference original"),
            ("L21R", "Belle Gibson cancer interview claim cured diet"),
            ("L22R", "Colin Powell Iraq WMD anthrax UN original speech"),
            ("L23R", "Tony Hayward Gulf of Mexico very big ocean original quote"),
          ]

          def run(pair):
            key, query = pair
            cmd = ["yt-dlp", "--flat-playlist", "--dump-single-json", f"ytsearch15:{query}"]
            try:
              result = subprocess.run(cmd, capture_output=True, text=True, timeout=90, check=True)
              data = json.loads(result.stdout)
              entries = [{
                "videoId": e.get("id"), "title": e.get("title"), "channel": e.get("channel") or e.get("uploader"),
                "duration": e.get("duration"), "url": e.get("url") or e.get("webpage_url"), "viewCount": e.get("view_count")
              } for e in (data.get("entries") or [])]
              return key, {"query": query, "results": entries, "error": None}
            except Exception as exc:
              return key, {"query": query, "results": [], "error": f"{type(exc).__name__}: {getattr(exc, 'stderr', None) or exc}"}

          output = {"generatedAt": time.strftime('%Y-%m-%dT%H:%M:%SZ', time.gmtime()), "queries": {}}
          with concurrent.futures.ThreadPoolExecutor(max_workers=8) as pool:
            for key, record in pool.map(run, queries):
              output["queries"][key] = record
              print(key, len(record["results"]))
          output["queries"] = dict(sorted(output["queries"].items()))
          Path("research/refined-candidates.json").write_text(json.dumps(output, indent=2) + "\n")
          PY
      - name: Commit results
        shell: bash
        run: |
          rm -f .github/workflows/refine-video-candidates.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Collect refined video candidates"
          git push
