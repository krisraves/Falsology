name: YouTube egress test

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 9
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install HTTP client
        run: pip install -U requests
      - name: Test rotating public egress routes
        shell: bash
        run: |
          python <<'PY'
          import json,re,threading
          from concurrent.futures import ThreadPoolExecutor,as_completed
          from pathlib import Path
          import requests

          sources=[
            'https://raw.githubusercontent.com/TheSpeedX/PROXY-List/master/http.txt',
            'https://raw.githubusercontent.com/proxifly/free-proxy-list/main/proxies/protocols/http/data.txt',
            'https://raw.githubusercontent.com/proxifly/free-proxy-list/main/proxies/protocols/https/data.txt',
            'https://raw.githubusercontent.com/monosans/proxy-list/main/proxies/http.txt',
            'https://raw.githubusercontent.com/monosans/proxy-list/main/proxies_anonymous/http.txt',
            'https://raw.githubusercontent.com/zloi-user/hideip.me/main/https.txt',
            'https://raw.githubusercontent.com/vakhov/fresh-proxy-list/master/http.txt',
          ]
          proxies=[]
          for source in sources:
            try:
              response=requests.get(source,timeout=20)
              if not response.ok:continue
              for line in response.text.splitlines():
                value=line.strip()
                value=re.sub(r'^https?://','',value)
                if re.fullmatch(r'[A-Za-z0-9.\-]+:\d{2,5}',value):proxies.append(value)
            except Exception as error:print('source failed',source,error)
          proxies=list(dict.fromkeys(proxies))[:1200]
          print('candidate count',len(proxies))

          video_id='3MuPWV5cTio'
          watch_url=f'https://www.youtube.com/embed/{video_id}?enablejsapi=1&cc_load_policy=1&controls=1&playsinline=1&hl=en&origin=https%3A%2F%2Ffalsology.vercel.app'
          headers={
            'User-Agent':'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/126 Safari/537.36',
            'Referer':'https://falsology.vercel.app/play',
            'Accept-Language':'en-US,en;q=0.9',
          }
          lock=threading.Lock();working=[];tested=0
          def test(proxy):
            route=f'http://{proxy}'
            try:
              response=requests.get(watch_url,headers=headers,proxies={'http':route,'https':route},timeout=7,verify=True,allow_redirects=True)
              text=response.text
              challenged='confirm you' in text.lower() and 'not a bot' in text.lower()
              error153='error 153' in text.lower()
              has_title='Chris Watts Case' in text
              has_player='ytInitialPlayerResponse' in text or 'playerResponse' in text
              has_captions='captionTracks' in text
              result={'proxy':proxy,'status':response.status_code,'length':len(text),'challenged':challenged,'error153':error153,'hasTitle':has_title,'hasPlayer':has_player,'hasCaptions':has_captions,'prefix':text[:200]}
              if response.status_code==200 and len(text)>100000 and has_title and not challenged and not error153:
                with lock:working.append(result)
              return result
            except Exception as error:return {'proxy':proxy,'error':type(error).__name__+': '+str(error)[:180]}

          results=[]
          with ThreadPoolExecutor(max_workers=120) as pool:
            futures=[pool.submit(test,proxy) for proxy in proxies]
            for future in as_completed(futures):
              result=future.result();results.append(result);tested+=1
              if result.get('hasCaptions') or (result.get('hasPlayer') and not result.get('challenged')):print('promising',result)
              if len(working)>=12:break
          successful=[result for result in results if result.get('status')==200]
          promising=[result for result in results if result.get('hasPlayer') or result.get('hasCaptions') or result.get('hasTitle')]
          report={'candidateCount':len(proxies),'testedCount':len(results),'working':working,'promising':promising[:100],'successfulHttp':successful[:100],'errors':results[:100]}
          Path('youtube-egress-test.json').write_text(json.dumps(report,indent=2,ensure_ascii=False)+'\n')
          print(json.dumps({'working':working,'promisingCount':len(promising),'successfulCount':len(successful)},indent=2))
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: youtube-egress-test
          path: youtube-egress-test.json
