name: Direct transcript XML test

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install HTTP client
        run: pip install -U requests
      - name: Test timestamped transcript XML
        shell: bash
        run: |
          python <<'PY'
          import html,json,re
          from concurrent.futures import ThreadPoolExecutor,as_completed
          from pathlib import Path
          import requests

          videos=['TM8EXwemnYA','K7iAlZzVenU','amHb2UoVZ_g','3MuPWV5cTio','DbXqiSYDhrA','ez-4b-yQGzg']
          pattern=re.compile(r'<text\s+start="([\d.]+)"\s+dur="([\d.]+)"[^>]*>([\s\S]*?)</text>')
          def fetch(video_id):
            url=f'https://youtubetranscript.com/?server_vid2={video_id}'
            try:
              response=requests.get(url,headers={'User-Agent':'Mozilla/5.0','Accept-Language':'en-US,en;q=0.9'},timeout=25)
              segments=[]
              for start,duration,text in pattern.findall(response.text):
                cleaned=html.unescape(re.sub(r'<[^>]*>','',text)).replace('\n',' ').strip()
                if cleaned:segments.append({'start':float(start),'duration':float(duration),'text':cleaned})
              return {'videoId':video_id,'status':response.status_code,'length':len(response.text),'segmentCount':len(segments),'segments':segments[:30],'prefix':response.text[:500]}
            except Exception as error:return {'videoId':video_id,'error':f'{type(error).__name__}: {error}'}
          results=[]
          with ThreadPoolExecutor(max_workers=6) as pool:
            futures=[pool.submit(fetch,video_id) for video_id in videos]
            for future in as_completed(futures):results.append(future.result())
          results.sort(key=lambda item:item['videoId'])
          Path('direct-transcript-test.json').write_text(json.dumps(results,indent=2,ensure_ascii=False)+'\n')
          print(json.dumps(results,indent=2,ensure_ascii=False))
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: direct-transcript-test
          path: direct-transcript-test.json
