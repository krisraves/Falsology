name: Timedtext relay test

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install HTTP client
        run: pip install -U requests
      - name: Inspect timedtext and watch-page metadata
        shell: bash
        run: |
          python <<'PY'
          import json,re
          from pathlib import Path
          from urllib.parse import quote
          import requests

          videos=['TM8EXwemnYA','K7iAlZzVenU','amHb2UoVZ_g','3MuPWV5cTio','DbXqiSYDhrA']
          relay=lambda url:f'https://api.allorigins.win/raw?url={quote(url,safe="")}'
          session=requests.Session();session.headers.update({'User-Agent':'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/126 Safari/537.36'})

          def request(url,timeout=35):
            response=session.get(relay(url),timeout=timeout)
            return {'status':response.status_code,'length':len(response.text),'prefix':response.text[:250],'text':response.text}

          report={}
          for video_id in videos:
            item={}
            try:
              watch=request(f'https://www.youtube.com/watch?v={video_id}&hl=en')
              text=watch.pop('text');item['watch']=watch
              item['markers']={
                'captionTracks':text.find('captionTracks'),
                'quotedCaptionTracks':text.find('"captionTracks"'),
                'escapedCaptionTracks':text.find('\\"captionTracks\\"'),
                'playerResponse':text.find('ytInitialPlayerResponse'),
                'playabilityStatus':text.find('playabilityStatus'),
              }
              for marker_name,position in item['markers'].items():
                if position>=0:item[f'{marker_name}Context']=text[max(0,position-180):position+500]
            except Exception as error:item['watchError']=f'{type(error).__name__}: {error}'

            urls={
              'list':f'https://www.youtube.com/api/timedtext?type=list&v={video_id}',
              'en-json3':f'https://www.youtube.com/api/timedtext?v={video_id}&lang=en&fmt=json3',
              'en-asr-json3':f'https://www.youtube.com/api/timedtext?v={video_id}&lang=en&kind=asr&fmt=json3',
              'en-xml':f'https://www.youtube.com/api/timedtext?v={video_id}&lang=en',
              'en-asr-xml':f'https://www.youtube.com/api/timedtext?v={video_id}&lang=en&kind=asr',
            }
            item['timedtext']={}
            for name,url in urls.items():
              try:
                result=request(url);text=result.pop('text')
                result['body']=text[:2000]
                if name.endswith('json3'):
                  try:result['eventCount']=len(json.loads(text).get('events',[]))
                  except Exception:result['eventCount']=0
                item['timedtext'][name]=result
              except Exception as error:item['timedtext'][name]={'error':f'{type(error).__name__}: {error}'}
            report[video_id]=item
          Path('timedtext-test.json').write_text(json.dumps(report,indent=2,ensure_ascii=False)+'\n')
          print(json.dumps(report,indent=2,ensure_ascii=False))
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: timedtext-test
          path: timedtext-test.json
