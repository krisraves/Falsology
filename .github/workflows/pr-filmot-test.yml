name: Player configuration extraction test

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install HTTP client
        run: pip install -U requests
      - name: Extract proxied YouTube player configuration
        shell: bash
        run: |
          python <<'PY'
          import json,re
          from pathlib import Path
          import requests

          proxies=['34.43.46.91:443','147.45.60.249:1082','50.205.246.13:80','146.190.60.147:8003','117.236.124.166:3128']
          video_id='3MuPWV5cTio'
          origin='https://falsology.vercel.app'
          urls={
            'embed':f'https://www.youtube.com/embed/{video_id}?enablejsapi=1&cc_load_policy=1&controls=1&playsinline=1&hl=en&origin=https%3A%2F%2Ffalsology.vercel.app',
            'watch':f'https://www.youtube.com/watch?v={video_id}&hl=en',
          }
          headers={'User-Agent':'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/126 Safari/537.36','Referer':origin+'/play','Accept-Language':'en-US,en;q=0.9'}
          marker_names=['ytInitialPlayerResponse','raw_player_response','player_response','PLAYER_CONFIG','PLAYER_VARS','captionTracks','playerCaptionsTracklistRenderer','timedtext','INNERTUBE_API_KEY','playabilityStatus']
          report=[]
          saved=False
          for proxy in proxies:
            route='http://'+proxy
            for kind,url in urls.items():
              item={'proxy':proxy,'kind':kind}
              try:
                response=requests.get(url,headers=headers,proxies={'http':route,'https':route},timeout=15,verify=True)
                text=response.text
                item.update({'status':response.status_code,'length':len(text),'title':re.search(r'<title[^>]*>(.*?)</title>',text,re.S).group(1)[:300] if re.search(r'<title[^>]*>(.*?)</title>',text,re.S) else None,'markers':{name:text.find(name) for name in marker_names}})
                contexts={}
                for name,position in item['markers'].items():
                  if position>=0:contexts[name]=text[max(0,position-500):position+3000]
                item['contexts']=contexts
                # Save the first full, non-challenged page for offline inspection.
                challenged='confirm you' in text.lower() and 'not a bot' in text.lower()
                if response.status_code==200 and len(text)>100000 and not challenged and not saved:
                  Path(f'proxied-youtube-{kind}.html').write_text(text)
                  saved=True
              except Exception as error:item['error']=f'{type(error).__name__}: {error}'
              report.append(item)
            if saved:break
          Path('player-config-report.json').write_text(json.dumps(report,indent=2,ensure_ascii=False)+'\n')
          print(json.dumps(report,indent=2,ensure_ascii=False)[:50000])
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: player-config-extraction
          path: |
            player-config-report.json
            proxied-youtube-*.html
