name: Parallel statement timestamp capture

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 18
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install audit tools
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium
          pip install -U rapidfuzz
      - name: Capture all caption tracks in parallel
        shell: bash
        run: |
          node <<'JS'
          const fs = require('fs');
          const { chromium } = require('playwright');

          const read = (path) => JSON.parse(fs.readFileSync(path, 'utf8'));
          const merge = (claim, override) => override
            ? { ...claim, ...override, media: { ...(claim.media || {}), ...(override.media || {}) } }
            : claim;
          const base = fs.readdirSync('data/cases')
            .filter((name) => /^part\d{2}\.json$/.test(name)).sort()
            .flatMap((name) => read(`data/cases/${name}`));
          const layers = [
            read('data/case-overrides.json'),
            read('data/direct-footage-replacements.json'),
            read('data/obscure-case-replacements.json'),
            read('data/english-weird-replacements.json'),
          ];
          const cases = base.map((item) => layers.reduce((claim, layer) => merge(claim, layer[claim.caseNumber]), item));
          const proxies = [
            'http://147.45.60.249:1082',
            'http://50.205.246.13:80',
            'http://181.39.25.196:8118',
            'http://117.236.124.166:3128',
          ];
          const origin = 'https://falsology.vercel.app';

          function parseJson3(payload) {
            const rows = [];
            for (const event of payload?.events || []) {
              const segs = event.segs || [];
              const text = segs.map((segment) => segment.utf8 || '').join('').replace(/\n/g, ' ').trim();
              if (!text) continue;
              const eventStart = Number(event.tStartMs || 0) / 1000;
              rows.push({
                text,
                start: eventStart,
                duration: Number(event.dDurationMs || 0) / 1000,
                words: segs.filter((segment) => String(segment.utf8 || '').trim()).map((segment) => ({
                  text: segment.utf8 || '',
                  start: eventStart + Number(segment.tOffsetMs || 0) / 1000,
                  confidence: segment.acAsrConf ?? null,
                })),
              });
            }
            return rows;
          }

          async function capture(browser, claim, proxy) {
            const context = await browser.newContext({
              locale: 'en-US',
              ignoreHTTPSErrors: true,
              extraHTTPHeaders: { Referer: `${origin}/play` },
            });
            const page = await context.newPage();
            page.setDefaultTimeout(3500);
            let resolveCaption;
            const captionPromise = new Promise((resolve) => { resolveCaption = resolve; });
            const item = {
              caseNumber: claim.caseNumber,
              person: claim.person,
              claim: claim.claim,
              transcriptTarget: claim.transcript,
              verdict: claim.verdict,
              videoId: claim.media.youtubeId,
              videoDurationSeconds: claim.media.videoDurationSeconds,
              proxy,
            };
            page.on('response', async (response) => {
              if (!response.url().includes('/api/timedtext')) return;
              if (!response.url().includes(`v=${claim.media.youtubeId}`)) return;
              try {
                const body = await response.text();
                if (body.length > 100) resolveCaption({ body, url: response.url(), status: response.status() });
              } catch {}
            });
            try {
              const params = new URLSearchParams({
                enablejsapi: '1', cc_load_policy: '1', controls: '1', playsinline: '1',
                autoplay: '1', mute: '1', hl: 'en', origin,
              });
              const response = await page.goto(`https://www.youtube.com/embed/${claim.media.youtubeId}?${params}`, {
                waitUntil: 'commit', timeout: 18000, referer: `${origin}/play`,
              });
              item.navigationStatus = response?.status() ?? null;
              let caption = await Promise.race([captionPromise, page.waitForTimeout(7000).then(() => null)]);
              if (!caption) {
                for (const selector of ['button[aria-label^="Play"]', '.ytp-large-play-button', '.ytp-play-button']) {
                  const button = page.locator(selector).first();
                  if (!await button.count()) continue;
                  try { await button.click({ force: true, timeout: 1200 }); break; } catch {}
                }
                const cc = page.locator('.ytp-subtitles-button').first();
                if (await cc.count()) try { await cc.click({ force: true, timeout: 1200 }); } catch {}
                caption = await Promise.race([captionPromise, page.waitForTimeout(5000).then(() => null)]);
              }
              item.page = await page.evaluate(() => ({
                title: document.title,
                errorText: document.querySelector('.ytp-error')?.textContent || null,
                bodyText: (document.body?.innerText || '').slice(0, 500),
              }));
              if (caption) {
                item.captionUrl = caption.url;
                item.captionStatus = caption.status;
                item.captionBodyLength = caption.body.length;
                item.captionRows = parseJson3(JSON.parse(caption.body));
              } else item.captionRows = [];
              item.success = item.captionRows.length > 0;
            } catch (error) {
              item.error = String(error?.stack || error);
              item.captionRows = [];
              item.success = false;
            } finally {
              await context.close().catch(() => {});
            }
            return item;
          }

          async function runProxy(proxy, assigned) {
            const browser = await chromium.launch({
              headless: true,
              proxy: { server: proxy },
              args: ['--autoplay-policy=no-user-gesture-required', '--no-sandbox'],
            });
            const results = [];
            let cursor = 0;
            async function worker() {
              while (cursor < assigned.length) {
                const index = cursor++;
                const claim = assigned[index];
                const result = await capture(browser, claim, proxy);
                results.push(result);
                console.log(`${claim.caseNumber} ${result.success ? 'OK' : 'FAIL'} rows=${result.captionRows?.length || 0} proxy=${proxy}`);
              }
            }
            await Promise.all(Array.from({ length: 3 }, worker));
            await browser.close().catch(() => {});
            return results;
          }

          (async () => {
            const groups = proxies.map(() => []);
            cases.forEach((claim, index) => groups[index % proxies.length].push(claim));
            const firstPass = (await Promise.all(proxies.map((proxy, index) => runProxy(proxy, groups[index])))).flat();
            const best = new Map(firstPass.map((item) => [item.caseNumber, item]));
            const failed = cases.filter((claim) => !best.get(claim.caseNumber)?.success);
            console.log(`First pass captured ${cases.length - failed.length}/50; retrying ${failed.length}`);

            if (failed.length) {
              const retryGroups = proxies.map(() => []);
              failed.forEach((claim, index) => retryGroups[index % proxies.length].push(claim));
              const retries = (await Promise.all(proxies.map((proxy, index) => runProxy(proxy, retryGroups[(index + 1) % proxies.length])))).flat();
              for (const item of retries) {
                if (item.success || !best.get(item.caseNumber)?.success) best.set(item.caseNumber, { ...item, retry: true });
              }
            }

            const finalCases = [...best.values()].sort((a, b) => a.caseNumber.localeCompare(b.caseNumber));
            fs.mkdirSync('timestamp-audit', { recursive: true });
            fs.writeFileSync('timestamp-audit/all-caption-tracks.json', JSON.stringify({ cases: finalCases }, null, 2));
            console.log(`Final capture: ${finalCases.filter((item) => item.success).length}/50`);
          })().catch((error) => { console.error(error); process.exit(1); });
          JS
      - name: Locate the exact spoken phrase
        shell: bash
        run: |
          python <<'PY'
          import html, json, re
          from pathlib import Path
          from rapidfuzz import fuzz

          data = json.loads(Path('timestamp-audit/all-caption-tracks.json').read_text())

          def normalize(text):
              text = html.unescape(text or '').lower().replace('’', "'")
              for pattern, replacement in [
                  (r'\bi am\b', "i'm"), (r'\bdid not\b', "didn't"),
                  (r'\bdo not\b', "don't"), (r'\bwas not\b', "wasn't"),
                  (r'\bcould not\b', "couldn't"), (r'\bthey are\b', "they're"),
                  (r'\bwe are\b', "we're"), (r'\bi have\b', "i've"),
              ]: text = re.sub(pattern, replacement, text)
              return re.sub(r'\s+', ' ', re.sub(r"[^a-z0-9']+", ' ', text)).strip()

          def score(target, candidate):
              return max(fuzz.ratio(target, candidate), fuzz.partial_ratio(target, candidate),
                         fuzz.token_set_ratio(target, candidate), fuzz.token_sort_ratio(target, candidate),
                         fuzz.WRatio(target, candidate))

          def word_candidates(case):
              words = []
              for row in case.get('captionRows') or []:
                  for word in row.get('words') or []:
                      token = normalize(word.get('text', ''))
                      if not token: continue
                      # Avoid repeated ASR rolling-caption words at an identical timestamp.
                      record = {'token': token, 'raw': word.get('text', '').strip(), 'start': float(word.get('start', 0))}
                      if not words or abs(words[-1]['start'] - record['start']) > 0.02 or words[-1]['token'] != token:
                          words.append(record)
              for index, word in enumerate(words):
                  next_start = words[index + 1]['start'] if index + 1 < len(words) else word['start'] + 0.6
                  word['end'] = max(word['start'] + 0.12, min(word['start'] + 1.5, next_start))
              return words

          report = []
          for case in data['cases']:
              targets = [normalize(case.get('claim')), normalize(case.get('transcriptTarget'))]
              targets = [target for target in targets if target]
              words = word_candidates(case)
              matches = []
              for start in range(len(words)):
                  text_tokens = []
                  for end in range(start, min(len(words), start + 35)):
                      text_tokens.append(words[end]['token'])
                      candidate = ' '.join(text_tokens)
                      raw = max(score(target, candidate) for target in targets) if targets else 0
                      longest_target = max(targets, key=len) if targets else ''
                      target_tokens = set(longest_target.split())
                      coverage = len(target_tokens & set(candidate.split())) / max(1, len(target_tokens))
                      length_ratio = min(len(candidate.split()), len(longest_target.split())) / max(1, max(len(candidate.split()), len(longest_target.split())))
                      adjusted = raw + coverage * 12 + length_ratio * 7 - max(0, len(candidate.split()) - len(longest_target.split()) - 4) * 0.7
                      matches.append({
                          'score': round(adjusted, 2), 'rawScore': round(raw, 2),
                          'wordCoverage': round(coverage, 3), 'lengthRatio': round(length_ratio, 3),
                          'statementStartSeconds': round(words[start]['start'], 3),
                          'statementEndSeconds': round(words[end]['end'], 3),
                          'matchedText': ' '.join(word['raw'] for word in words[start:end + 1]),
                      })
              matches.sort(key=lambda item: (item['score'], item['wordCoverage'], item['lengthRatio']), reverse=True)
              top = matches[:15]
              best = top[0] if top else None
              status = 'strong-match' if best and best['rawScore'] >= 86 and best['wordCoverage'] >= 0.62 else 'review-or-replace'
              report.append({
                  'caseNumber': case['caseNumber'], 'person': case['person'], 'verdict': case['verdict'],
                  'claim': case['claim'], 'videoId': case['videoId'],
                  'videoDurationSeconds': case.get('videoDurationSeconds'),
                  'captionCaptured': bool(case.get('success')), 'captionRows': len(case.get('captionRows') or []),
                  'wordCount': len(words), 'status': status, 'topMatches': top,
                  'page': case.get('page'), 'captureError': case.get('error'),
              })
              print(case['caseNumber'], status, best['rawScore'] if best else None,
                    best['statementStartSeconds'] if best else None, best['matchedText'] if best else '')

          Path('timestamp-audit/statement-match-report.json').write_text(json.dumps({'cases': report}, indent=2, ensure_ascii=False) + '\n')
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: parallel-statement-timestamp-audit
          path: timestamp-audit/
