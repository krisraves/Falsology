name: Subtitle index test

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install HTTP client
        run: pip install -U requests
      - name: Search indexed subtitles
        shell: bash
        run: |
          python <<'PY'
          import json,re,time
          from pathlib import Path
          from urllib.parse import quote
          import requests

          tests=[
            ('L01','3MuPWV5cTio',"I have no inclination of where they're at right now",'Chris Watts'),
            ('L04','ez-4b-yQGzg',"I wasn't there when Travis was killed",'Jodi Arias'),
            ('L11','DbXqiSYDhrA','The Nikola One is fully functioning','Trevor Milton'),
            ('L16','TM8EXwemnYA','I did not have sexual relations with that woman','Bill Clinton'),
            ('T21','K7iAlZzVenU','A humpback whale had me inside its mouth and spit me back out','Michael Packard'),
            ('L09','amHb2UoVZ_g','Intruders tied me up and attacked my parents','Jennifer Pan'),
          ]
          session=requests.Session();session.headers.update({'User-Agent':'Mozilla/5.0','Accept':'text/html,application/xhtml+xml'})
          def parse(text):
            m=re.search(r'window\.results\s*=\s*(\{.*?\});',text,re.S)
            if not m:return []
            try:data=json.loads(m.group(1))
            except Exception:return []
            out=[]
            for value in data.values():
              vid=value.get('vid')
              for hit in value.get('hits',[]):
                out.append({'videoId':vid,'start':hit.get('start'),'duration':hit.get('dur'),'token':hit.get('token'),'contextBefore':hit.get('ctx_before'),'contextAfter':hit.get('ctx_after')})
            return out
          report={}
          for case,vid,claim,person in tests:
            queries=[claim,f'{person} {claim}',' '.join([w for w in re.findall(r"[A-Za-z']+",claim) if len(w)>4])]
            item={'videoId':vid,'claim':claim,'queries':[]}
            for q in queries:
              url=f'https://filmot.com/search/{quote(q,safe="")}/1/1?gridView=1'
              try:
                r=session.get(url,timeout=25)
                hits=parse(r.text) if r.ok else []
                item['queries'].append({'query':q,'status':r.status_code,'length':len(r.text),'matchingVideo':[h for h in hits if h['videoId']==vid],'allHits':hits[:30],'prefix':r.text[:150]})
              except Exception as e:item['queries'].append({'query':q,'error':f'{type(e).__name__}: {e}'})
              time.sleep(.5)
            report[case]=item
          Path('filmot-test.json').write_text(json.dumps(report,indent=2,ensure_ascii=False)+'\n')
          print(json.dumps(report,indent=2,ensure_ascii=False))
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: filmot-test
          path: filmot-test.json
