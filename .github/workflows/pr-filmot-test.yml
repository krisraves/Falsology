name: Browser caption-track test

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 18
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Chromium automation
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium
      - name: Inspect YouTube caption tracks in Chromium
        shell: bash
        run: |
          node <<'JS'
          const fs = require('fs');
          const { chromium } = require('playwright');

          const videos = [
            'TM8EXwemnYA',
            'K7iAlZzVenU',
            'amHb2UoVZ_g',
            '3MuPWV5cTio',
            'DbXqiSYDhrA',
            'ez-4b-yQGzg',
          ];

          function extractBalancedArray(text, marker) {
            const markerIndex = text.indexOf(marker);
            if (markerIndex < 0) return null;
            const start = text.indexOf('[', markerIndex);
            if (start < 0) return null;
            let depth = 0;
            let inString = false;
            let escaped = false;
            for (let index = start; index < text.length; index += 1) {
              const char = text[index];
              if (escaped) { escaped = false; continue; }
              if (inString) {
                if (char === '\\') escaped = true;
                else if (char === '"') inString = false;
                continue;
              }
              if (char === '"') inString = true;
              else if (char === '[') depth += 1;
              else if (char === ']') {
                depth -= 1;
                if (depth === 0) return text.slice(start, index + 1);
              }
            }
            return null;
          }

          function parseJson3(payload) {
            const rows = [];
            for (const event of payload?.events || []) {
              const text = (event.segs || []).map((segment) => segment.utf8 || '').join('').replace(/\n/g, ' ').trim();
              if (!text) continue;
              rows.push({
                text,
                start: Number(event.tStartMs || 0) / 1000,
                duration: Number(event.dDurationMs || 0) / 1000,
              });
            }
            return rows;
          }

          (async () => {
            const browser = await chromium.launch({
              headless: true,
              args: [
                '--autoplay-policy=no-user-gesture-required',
                '--disable-features=MediaRouter',
                '--no-sandbox',
              ],
            });
            const context = await browser.newContext({
              locale: 'en-US',
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/126.0.0.0 Safari/537.36',
            });
            const report = [];

            for (const videoId of videos) {
              const page = await context.newPage();
              const timedTextResponses = [];
              page.on('response', async (response) => {
                if (!response.url().includes('timedtext')) return;
                try {
                  const body = await response.text();
                  timedTextResponses.push({
                    url: response.url(),
                    status: response.status(),
                    length: body.length,
                    prefix: body.slice(0, 300),
                    body,
                  });
                } catch (error) {
                  timedTextResponses.push({ url: response.url(), error: String(error) });
                }
              });

              const item = { videoId, timedTextResponses: [] };
              try {
                const url = `https://www.youtube.com/embed/${videoId}?enablejsapi=1&cc_load_policy=1&controls=1&playsinline=1&hl=en`;
                const response = await page.goto(url, { waitUntil: 'domcontentloaded', timeout: 60000 });
                item.navigationStatus = response?.status() ?? null;
                await page.waitForTimeout(7000);

                for (const label of ['Accept all', 'I agree', 'Reject all']) {
                  const button = page.getByRole('button', { name: label, exact: false }).first();
                  if (await button.count()) {
                    try { await button.click({ timeout: 1500 }); } catch {}
                  }
                }
                await page.waitForTimeout(2500);

                item.pageState = await page.evaluate(() => {
                  const globalResponse = window.ytInitialPlayerResponse;
                  const tracks = globalResponse?.captions?.playerCaptionsTracklistRenderer?.captionTracks || [];
                  const scriptTexts = Array.from(document.scripts)
                    .map((script) => script.textContent || '')
                    .filter((text) => text.includes('captionTracks'));
                  return {
                    url: location.href,
                    title: document.title,
                    htmlLength: document.documentElement.outerHTML.length,
                    bodyText: (document.body?.innerText || '').slice(0, 800),
                    hasVideoElement: Boolean(document.querySelector('video')),
                    hasCaptionButton: Boolean(document.querySelector('.ytp-subtitles-button')),
                    playerError: document.querySelector('.ytp-error')?.textContent || null,
                    globalTrackCount: tracks.length,
                    globalTracks: tracks.map((track) => ({
                      baseUrl: track.baseUrl,
                      languageCode: track.languageCode,
                      kind: track.kind,
                      name: track.name,
                    })),
                    matchingScriptCount: scriptTexts.length,
                    matchingScripts: scriptTexts.slice(0, 3).map((text) => text.slice(0, 120000)),
                  };
                });

                let tracks = item.pageState.globalTracks || [];
                if (!tracks.length) {
                  for (const scriptText of item.pageState.matchingScripts || []) {
                    const raw = extractBalancedArray(scriptText, '"captionTracks":');
                    if (!raw) continue;
                    try {
                      tracks = JSON.parse(raw);
                      if (tracks.length) break;
                    } catch {}
                  }
                }
                item.extractedTracks = tracks.map((track) => ({
                  baseUrl: track.baseUrl,
                  languageCode: track.languageCode,
                  kind: track.kind,
                  name: track.name,
                }));

                const englishTrack = tracks.find((track) => String(track.languageCode || '').startsWith('en')) || tracks[0];
                if (englishTrack?.baseUrl) {
                  let captionUrl = englishTrack.baseUrl;
                  captionUrl += captionUrl.includes('?') ? '&fmt=json3' : '?fmt=json3';
                  const captionResponse = await context.request.get(captionUrl, {
                    headers: {
                      'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/126.0.0.0 Safari/537.36',
                      Referer: url,
                    },
                    timeout: 45000,
                  });
                  const body = await captionResponse.text();
                  item.captionFetch = {
                    status: captionResponse.status(),
                    length: body.length,
                    prefix: body.slice(0, 300),
                  };
                  try {
                    item.captionRows = parseJson3(JSON.parse(body));
                  } catch {
                    item.captionRows = [];
                  }
                }

                const subtitleButton = page.locator('.ytp-subtitles-button').first();
                if (await subtitleButton.count()) {
                  try { await subtitleButton.click({ timeout: 2500 }); } catch {}
                }
                const video = page.locator('video').first();
                if (await video.count()) {
                  try {
                    await video.evaluate((element) => {
                      element.muted = true;
                      element.currentTime = 1;
                      return element.play();
                    });
                    await page.waitForTimeout(4500);
                    item.liveCaptionText = await page.locator('.ytp-caption-segment').allTextContents();
                  } catch (error) {
                    item.playError = String(error);
                  }
                }
                item.timedTextResponses = timedTextResponses.map(({ body, ...rest }) => rest);
                item.timedTextBodies = timedTextResponses.map((entry) => entry.body).filter(Boolean);
              } catch (error) {
                item.error = String(error?.stack || error);
              }
              report.push(item);
              await page.close();
            }

            fs.writeFileSync('browser-caption-test.json', JSON.stringify(report, null, 2));
            console.log(JSON.stringify(report.map((item) => ({
              videoId: item.videoId,
              navigationStatus: item.navigationStatus,
              trackCount: item.extractedTracks?.length || 0,
              captionRows: item.captionRows?.length || 0,
              timedTextResponses: item.timedTextResponses?.length || 0,
              error: item.error,
            })), null, 2));
            await browser.close();
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          JS
      - uses: actions/upload-artifact@v4
        with:
          name: browser-caption-test
          path: browser-caption-test.json
