name: Caption relay test

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install HTTP client
        run: pip install -U requests
      - name: Test browser relay caption extraction
        shell: bash
        run: |
          python <<'PY'
          import html,json,re
          from pathlib import Path
          from urllib.parse import quote
          import requests

          videos=['TM8EXwemnYA','K7iAlZzVenU','amHb2UoVZ_g','3MuPWV5cTio']
          relay_builders={
            'allorigins':lambda url:f'https://api.allorigins.win/raw?url={quote(url,safe="")}',
            'corsproxy':lambda url:f'https://corsproxy.io/?{quote(url,safe="")}',
            'corsproxy-path':lambda url:f'https://corsproxy.io/{url}',
          }
          session=requests.Session();session.headers.update({'User-Agent':'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/126 Safari/537.36'})

          def balanced_array(text,start):
            depth=0;inside=False;escaped=False
            for index in range(start,len(text)):
              char=text[index]
              if escaped:escaped=False;continue
              if inside:
                if char=='\\':escaped=True
                elif char=='"':inside=False
                continue
              if char=='"':inside=True
              elif char=='[':depth+=1
              elif char==']':
                depth-=1
                if depth==0:return text[start:index+1]
            return None

          report={}
          for video_id in videos:
            report[video_id]=[]
            watch_url=f'https://www.youtube.com/watch?v={video_id}&hl=en'
            for relay_name,build in relay_builders.items():
              item={'relay':relay_name,'watchRelayUrl':build(watch_url)}
              try:
                response=session.get(build(watch_url),timeout=35)
                text=response.text
                item.update({'watchStatus':response.status_code,'watchLength':len(text),'watchPrefix':text[:180],'hasPlayerResponse':'ytInitialPlayerResponse' in text})
                position=text.find('"captionTracks":')
                item['captionMarker']=position
                if position>=0:
                  bracket=text.find('[',position);raw=balanced_array(text,bracket)
                  tracks=json.loads(raw) if raw else []
                  item['trackCount']=len(tracks)
                  item['tracks']=[{k:t.get(k) for k in ['languageCode','kind','baseUrl']} for t in tracks[:5]]
                  track=next((t for t in tracks if (t.get('languageCode') or '').startswith('en')),tracks[0] if tracks else None)
                  if track and track.get('baseUrl'):
                    caption_url=html.unescape(track['baseUrl'])
                    caption_url += ('&' if '?' in caption_url else '?')+'fmt=json3'
                    item['captionUrlPrefix']=caption_url[:200]
                    caption_response=session.get(build(caption_url),timeout=35)
                    item.update({'captionStatus':caption_response.status_code,'captionLength':len(caption_response.text),'captionPrefix':caption_response.text[:250]})
                    try:
                      payload=caption_response.json();item['eventCount']=len(payload.get('events',[]));item['firstEvents']=payload.get('events',[])[:3]
                    except Exception:item['eventCount']=0
              except Exception as error:item['error']=f'{type(error).__name__}: {error}'
              report[video_id].append(item)
              if item.get('eventCount'):break
          Path('relay-test.json').write_text(json.dumps(report,indent=2,ensure_ascii=False)+'\n')
          print(json.dumps(report,indent=2,ensure_ascii=False))
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: relay-test
          path: relay-test.json
