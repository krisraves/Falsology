name: Test Jina YouTube caption access

on:
  push:
    paths:
      - .github/workflows/test-jina-youtube-captions.yml

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: exact-statement-windows
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Test Jina Reader
        run: |
          python <<'PY'
          import json, pathlib, urllib.request
          tests=['amHb2UoVZ_g','3MuPWV5cTio','K7iAlZzVenU']
          out={}
          for vid in tests:
              url=f'https://r.jina.ai/http://www.youtube.com/watch?v={vid}'
              try:
                  req=urllib.request.Request(url,headers={'User-Agent':'Mozilla/5.0'})
                  with urllib.request.urlopen(req,timeout=45) as r:
                      text=r.read().decode('utf-8','replace')
                  out[vid]={'ok':True,'length':len(text),'preview':text[:12000]}
              except Exception as e:
                  out[vid]={'ok':False,'error':f'{type(e).__name__}: {e}'}
          pathlib.Path('audit').mkdir(exist_ok=True)
          pathlib.Path('audit/jina-youtube-test.json').write_text(json.dumps(out,indent=2,ensure_ascii=False)+'\n')
          PY
      - name: Commit test
        run: |
          rm .github/workflows/test-jina-youtube-captions.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Record Jina YouTube caption test"
          git push origin exact-statement-windows
