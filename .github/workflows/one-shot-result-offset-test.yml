name: One-shot YouGlish result offset test

on:
  push:
    paths:
      - .github/workflows/one-shot-result-offset-test.yml

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: exact-statement-windows
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install parser
        run: pip install -U requests
      - name: Test result offsets
        run: |
          python <<'PY'
          import ast,json,re,time,urllib.parse,requests
          from pathlib import Path
          s=requests.Session();s.headers.update({'User-Agent':'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/140.0.0.0 Safari/537.36','Accept-Language':'en-US,en;q=0.9'})
          out=[]
          for query in ['no inclination','I am innocent.','took my boys','bushy-haired stranger']:
            for start in [1,11,21,31,41,51,61,71,81,91]:
              url='https://youglish.com/pronounce/'+urllib.parse.quote(query,safe='')+f'/english/all/emb=1&e_id=audit&e_comp=8264&e_start={start}&e_h=-1&e_notif_h=1&e_cur_w=900'
              row={'query':query,'start':start,'url':url}
              try:
                r=s.get(url,timeout=30);row['status']=r.status_code
                m=re.search(r"params\.jsonData\s*=\s*'((?:\\.|[^'])*)';",r.text)
                if m:
                  data=json.loads(ast.literal_eval("'"+m.group(1)+"'"));row['totalResults']=data.get('total_results');row['results']=[{'vid':x.get('vid'),'start':x.get('start'),'end':x.get('end'),'display':x.get('display')} for x in data.get('results',[])]
                else:row['results']=[]
              except Exception as e:row['error']=f'{type(e).__name__}: {e}'
              out.append(row);time.sleep(.8)
          Path('audit/result-offset-test.json').write_text(json.dumps(out,indent=2,ensure_ascii=False)+'\n')
          PY
      - name: Commit result and remove workflow
        run: |
          rm .github/workflows/one-shot-result-offset-test.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Record YouGlish result offset test"
          git pull --rebase origin exact-statement-windows
          git push origin exact-statement-windows
