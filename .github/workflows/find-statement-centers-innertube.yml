name: Find statement timestamps through player caption tracks

on:
  push:
    paths:
      - .github/workflows/find-statement-centers-innertube.yml

permissions:
  contents: write

jobs:
  locate:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          ref: statement-centered-clips
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install tools
        run: pip install -U requests rapidfuzz
      - name: Extract caption tracks and match statements
        shell: bash
        run: |
          python <<'PY'
          import html,json,re,time
          from concurrent.futures import ThreadPoolExecutor,as_completed
          from pathlib import Path
          import requests
          from rapidfuzz import fuzz

          API_KEY='AIzaSyAO_FJ2SlqU8Q4STEHLGCilw_Y9_11qcW8'
          PLAYER=f'https://www.youtube.com/youtubei/v1/player?key={API_KEY}&prettyPrint=false'
          clients=[
            ({'clientName':'ANDROID','clientVersion':'19.09.37','androidSdkVersion':30,'hl':'en','gl':'US'},'com.google.android.youtube/19.09.37 (Linux; U; Android 11) gzip'),
            ({'clientName':'ANDROID_EMBEDDED_PLAYER','clientVersion':'19.09.37','androidSdkVersion':30,'hl':'en','gl':'US'},'com.google.android.youtube/19.09.37 (Linux; U; Android 11) gzip'),
            ({'clientName':'IOS','clientVersion':'19.09.3','deviceModel':'iPhone14,3','osName':'iPhone','osVersion':'17.3.1.21D61','hl':'en','gl':'US'},'com.google.ios.youtube/19.09.3 (iPhone14,3; U; CPU iOS 17_3_1 like Mac OS X;)'),
            ({'clientName':'TVHTML5','clientVersion':'7.20240724.13.00','hl':'en','gl':'US'},'Mozilla/5.0 (ChromiumStylePlatform) Cobalt/Version'),
            ({'clientName':'WEB','clientVersion':'2.20240726.00.00','hl':'en','gl':'US'},'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/126 Safari/537.36'),
            ({'clientName':'MWEB','clientVersion':'2.20240726.01.00','hl':'en','gl':'US'},'Mozilla/5.0 (Linux; Android 11) AppleWebKit/537.36 Chrome/126 Mobile Safari/537.36'),
          ]
          s=requests.Session()

          def load(p):return json.loads(Path(p).read_text())
          base=[]
          for p in sorted(Path('data/cases').glob('part*.json')):base.extend(load(p))
          layers=[load('data/case-overrides.json'),load('data/direct-footage-replacements.json'),load('data/obscure-case-replacements.json'),load('data/english-weird-replacements.json')]
          def merge(c,o):
            if not o:return c
            x={**c,**o};x['media']={**c.get('media',{}),**o.get('media',{})};return x
          cases=[]
          for c in base:
            for layer in layers:c=merge(c,layer.get(c['caseNumber']))
            cases.append(c)

          def norm(t):
            t=html.unescape(t or '').lower().replace('’',"'")
            for a,b in [(r'\bi am\b',"i'm"),(r'\bdid not\b',"didn't"),(r'\bdo not\b',"don't"),(r'\bwas not\b',"wasn't"),(r'\bthey are\b',"they're")]:t=re.sub(a,b,t)
            return re.sub(r'\s+',' ',re.sub(r"[^a-z0-9']+",' ',t)).strip()
          def parse_json3(data):
            out=[]
            for e in data.get('events',[]):
              text=''.join(seg.get('utf8','') for seg in e.get('segs',[])).replace('\n',' ').strip()
              if text:out.append({'text':text,'start':e.get('tStartMs',0)/1000,'duration':e.get('dDurationMs',0)/1000})
            return out
          def best(rows,targets):
            targets=[norm(x) for x in targets if norm(x)];winner=None
            for i in range(len(rows)):
              text=''
              for j in range(i,min(len(rows),i+18)):
                text=(text+' '+rows[j]['text']).strip();candidate=norm(text)
                raw=max(max(fuzz.ratio(t,candidate),fuzz.partial_ratio(t,candidate),fuzz.token_set_ratio(t,candidate),fuzz.token_sort_ratio(t,candidate)) for t in targets)
                st=rows[i]['start'];en=rows[j]['start']+rows[j]['duration'];span=en-st
                score=raw-max(0,span-20)*.3-max(0,j-i-10)*.5
                r={'score':round(score,2),'rawScore':round(raw,2),'statementStartSeconds':round(st,2),'statementEndSeconds':round(en,2),'matchedText':text}
                if winner is None or r['score']>winner['score']:winner=r
            return winner

          def get_transcript(vid):
            errors=[]
            for client,ua in clients:
              try:
                payload={'context':{'client':client},'videoId':vid,'contentCheckOk':True,'racyCheckOk':True,'thirdParty':{'embedUrl':'https://falsology.vercel.app'}}
                r=s.post(PLAYER,json=payload,headers={'User-Agent':ua,'Content-Type':'application/json','Origin':'https://www.youtube.com'},timeout=18)
                if not r.ok:errors.append(f'{client["clientName"]}:{r.status_code}');continue
                data=r.json();status=((data.get('playabilityStatus') or {}).get('status'))
                tracks=(((data.get('captions') or {}).get('playerCaptionsTracklistRenderer') or {}).get('captionTracks') or [])
                tracks.sort(key=lambda t:(0 if (t.get('languageCode') or '').lower().startswith('en') else 1,1 if t.get('kind')=='asr' else 0))
                for track in tracks:
                  if not (track.get('languageCode') or '').lower().startswith('en'):continue
                  url=track.get('baseUrl')
                  if not url:continue
                  sep='&' if '?' in url else '?';cr=s.get(url+sep+'fmt=json3',headers={'User-Agent':ua},timeout=18)
                  if not cr.ok:continue
                  try:rows=parse_json3(cr.json())
                  except Exception:rows=[]
                  if rows:return rows,{'client':client['clientName'],'status':status,'track':{k:track.get(k) for k in ['languageCode','kind','isTranslatable','name']}},errors
                errors.append(f'{client["clientName"]}:status={status},tracks={len(tracks)}')
              except Exception as e:errors.append(f'{client["clientName"]}:{type(e).__name__}:{e}')
              time.sleep(.15)
            return [],None,errors

          def process(c):
            rows,source,errors=get_transcript(c['media']['youtubeId'])
            match=best(rows,[c.get('claim',''),c.get('transcript','')]) if rows else None
            return {'caseNumber':c['caseNumber'],'person':c['person'],'claim':c['claim'],'verdict':c['verdict'],'videoId':c['media']['youtubeId'],'videoDurationSeconds':c['media'].get('videoDurationSeconds'),'captionSource':source,'transcriptSegments':len(rows),'match':match,'errors':errors}

          results=[]
          with ThreadPoolExecutor(max_workers=5) as pool:
            fs={pool.submit(process,c):c for c in cases}
            for f in as_completed(fs):
              x=f.result();results.append(x);print(x['caseNumber'],x['match']['rawScore'] if x['match'] else None,x['captionSource'])
          results.sort(key=lambda x:x['caseNumber'])
          Path('timestamp-audit').mkdir(exist_ok=True)
          Path('timestamp-audit/innertube-caption-matches.json').write_text(json.dumps({'cases':results},indent=2,ensure_ascii=False)+'\n')
          PY
      - name: Commit report
        run: |
          rm .github/workflows/find-statement-centers-innertube.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Record player caption matches" || exit 0
          git push origin statement-centered-clips
