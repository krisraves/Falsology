name: Report duplicate videos

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - ready_for_review

permissions:
  contents: write

concurrency:
  group: unique-video-deck-planning
  cancel-in-progress: true

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/unique-video-deck
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build source plan and recover transcript audit
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          node scripts/report-video-duplicates.mjs
          node scripts/build-unique-source-plan.mjs
          gh api repos/krisraves/Falsology/git/blobs/6a6b2fa967519dba8ae8cb6f76c1f02cd35d7b37 --jq .content | base64 -d > validation/historical-statement-candidates.json
          gh api repos/krisraves/Falsology/git/blobs/e4be23b10e04a0dcdedc66314bd620806f3b72fe --jq .content | base64 -d > validation/historical-statement-candidates.md
      - shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add validation/video-duplicate-report.json validation/unique-source-plan.json validation/historical-statement-candidates.json validation/historical-statement-candidates.md
          if ! git diff --cached --quiet; then
            git commit -m "Recover unique video transcript evidence"
            git push origin agent/unique-video-deck
          fi
