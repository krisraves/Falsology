name: Report duplicate videos

on:
  pull_request:
    branches:
      - main
    types:
      - opened

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/unique-video-deck
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/report-video-duplicates.mjs
      - shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add validation/video-duplicate-report.json
          git commit -m "Record duplicate video report"
          git push origin agent/unique-video-deck
