name: Report duplicate videos

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - ready_for_review

permissions:
  contents: write

concurrency:
  group: unique-video-deck-planning
  cancel-in-progress: true

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/unique-video-deck
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: |
          node scripts/report-video-duplicates.mjs
          node scripts/build-unique-source-plan.mjs
      - shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add validation/video-duplicate-report.json validation/unique-source-plan.json
          if ! git diff --cached --quiet; then
            git commit -m "Record unique video source plan"
            git push origin agent/unique-video-deck
          fi
