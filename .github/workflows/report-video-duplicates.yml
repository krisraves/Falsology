name: Summarize unique video direct lines

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - ready_for_review

permissions:
  contents: write

concurrency:
  group: unique-video-deck-summary
  cancel-in-progress: true

jobs:
  summarize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/unique-video-deck
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/summarize-missing-unique-lines.mjs
      - shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add validation/missing-unique-video-lines.md
          if ! git diff --cached --quiet; then
            git commit -m "Summarize unique video direct lines"
            git push origin agent/unique-video-deck
          fi
