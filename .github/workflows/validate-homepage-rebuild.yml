name: Validate homepage rebuild

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

concurrency:
  group: falsology-homepage-rebuild
  cancel-in-progress: true

jobs:
  validate:
    if: github.head_ref == 'agent/homepage-rebuild'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/homepage-rebuild
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Validate application
        run: |
          npm ci
          npm run lint
          npm run typecheck
          npm run build
