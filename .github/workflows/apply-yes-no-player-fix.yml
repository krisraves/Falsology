name: Apply yes-no controls and resilient playback

on:
  push:
    paths:
      - .github/workflows/apply-yes-no-player-fix.yml

permissions:
  contents: write

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply interface and playback fixes
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file_path = Path(path)
              text = file_path.read_text()
              if old not in text:
                  raise SystemExit(f"Expected block was not found in {path}")
              file_path.write_text(text.replace(old, new, 1))

          replace_once(
              "components/GameClient.tsx",
              '''  function nextClaim() {
              if (player.answered > 0 && player.answered % 4 === 0) setAdBreak(true);
              else advance();
            }

            function toggleSaved() {''',
              '''  function nextClaim() {
              if (player.answered > 0 && player.answered % 4 === 0) setAdBreak(true);
              else advance();
            }

            function skipUnavailableClaim() {
              if (queue.length <= 1) return false;
              const remainingCount = queue.length - 1;
              setQueue((current) => current.filter((item) => item.id !== claim.id));
              setIndex((current) => current % remainingCount);
              setAnswer(null);
              setExpanded(false);
              setAdBreak(false);
              window.scrollTo({ top: 0, behavior: "smooth" });
              return true;
            }

            function toggleSaved() {''',
          )

          replace_once(
              "components/GameClient.tsx",
              '''              <MediaPanel key={claim.id} claim={claim} />''',
              '''              <MediaPanel key={claim.id} claim={claim} onUnavailable={skipUnavailableClaim} />''',
          )

          replace_once(
              "components/GameClient.tsx",
              '''              {!answer ? (
                <div className="detective-actions simple-verdicts" aria-label="Choose truth or lie">
                  <button className="verdict-button verdict-holds" onClick={() => choose("truth")}>
                    <span>✓</span><strong>Truth</strong>
                  </button>
                  <button className="verdict-button verdict-breaks" onClick={() => choose("lie")}>
                    <span>×</span><strong>Lie</strong>
                  </button>
                </div>
              ) : (''',
              '''              {!answer ? (
                <>
                  <p className="case-instruction">Are they lying?</p>
                  <div className="detective-actions simple-verdicts" aria-label="Are they lying?">
                    <button className="verdict-button verdict-breaks" onClick={() => choose("lie")}>
                      <span aria-hidden="true">Y</span><strong>Yes</strong>
                    </button>
                    <button className="verdict-button verdict-holds" onClick={() => choose("truth")}>
                      <span aria-hidden="true">N</span><strong>No</strong>
                    </button>
                  </div>
                </>
              ) : (''',
          )

          Path("components/MediaPanel.tsx").write_text('''import { ClipPlayer } from "@/components/ClipPlayer";
          import type { Claim } from "@/lib/types";

          export function MediaPanel({
            claim,
            compact = false,
            onUnavailable,
          }: {
            claim: Claim;
            compact?: boolean;
            onUnavailable?: () => boolean;
          }) {
            const { media } = claim;

            return (
              <div className={`media-frame detective-media ${compact ? "media-frame-compact" : ""}`}>
                <ClipPlayer
                  videoId={media.youtubeId}
                  title={`${claim.person}: ${claim.claim}`}
                  startSeconds={media.startSeconds}
                  endSeconds={media.endSeconds}
                  sourceUrl={media.url}
                  onUnavailable={onUnavailable}
                />
              </div>
            );
          }
          ''')

          clip_path = Path("components/ClipPlayer.tsx")
          clip = clip_path.read_text()
          clip = clip.replace(
              '''type VideoRange = {
            videoId: string;
            title: string;
            startSeconds: number;
            endSeconds: number;
            sourceUrl: string;
          };''',
              '''type VideoRange = {
            videoId: string;
            title: string;
            startSeconds: number;
            endSeconds: number;
            sourceUrl: string;
            onUnavailable?: () => boolean;
          };

          type PlaybackSource = {
            videoId: string;
            startSeconds: number;
            endSeconds: number;
            sourceUrl: string;
          };

          const SOURCE_REPLACEMENTS: Record<string, PlaybackSource[]> = {
            W259o2tO2pc: [
              {
                videoId: "CA-yk8-ALoc",
                startSeconds: 0,
                endSeconds: 25,
                sourceUrl: "https://www.youtube.com/watch?v=CA-yk8-ALoc&t=0s",
              },
              {
                videoId: "bphNcBD663M",
                startSeconds: 221,
                endSeconds: 246,
                sourceUrl: "https://www.youtube.com/watch?v=bphNcBD663M&t=221s",
              },
            ],
          };

          function buildSourceChain(
            videoId: string,
            startSeconds: number,
            endSeconds: number,
            sourceUrl: string,
          ): PlaybackSource[] {
            const primary = { videoId, startSeconds, endSeconds, sourceUrl };
            return [...(SOURCE_REPLACEMENTS[videoId] ?? []), primary];
          }''',
              1,
          )
          clip = clip.replace(
              '''type ErrorEvent = { data: number };''',
              '''type ErrorEvent = PlayerEvent & { data: number };''',
              1,
          )
          function_start = clip.index("export function ClipPlayer")
          clip = clip[:function_start] + '''export function ClipPlayer({
            videoId,
            title,
            startSeconds,
            endSeconds,
            sourceUrl,
            onUnavailable,
          }: VideoRange) {
            const reactId = useId();
            const mountRef = useRef<HTMLDivElement>(null);
            const playerRef = useRef<YouTubePlayer | null>(null);
            const sourcesRef = useRef<PlaybackSource[]>(
              buildSourceChain(videoId, startSeconds, endSeconds, sourceUrl),
            );
            const sourceIndexRef = useRef(0);
            const unavailableNotifiedRef = useRef(false);
            const onUnavailableRef = useRef(onUnavailable);
            const [activeSource, setActiveSource] = useState<PlaybackSource>(sourcesRef.current[0]);
            const [ready, setReady] = useState(false);
            const [playing, setPlaying] = useState(false);
            const [ended, setEnded] = useState(false);
            const [elapsed, setElapsed] = useState(0);
            const [error, setError] = useState<string | null>(null);
            const duration = Math.max(1, activeSource.endSeconds - activeSource.startSeconds);
            const progress = Math.min(100, Math.max(0, (elapsed / duration) * 100));
            const mountId = `clip-player-${reactId.replace(/:/g, "")}-${sourceIndexRef.current}`;

            useEffect(() => {
              onUnavailableRef.current = onUnavailable;
            }, [onUnavailable]);

            useEffect(() => {
              let cancelled = false;
              setReady(false);
              setPlaying(false);
              setEnded(false);
              setElapsed(0);
              setError(null);

              loadYouTubeApi()
                .then((YT) => {
                  if (cancelled || !mountRef.current) return;

                  playerRef.current = new YT.Player(mountRef.current, {
                    videoId: activeSource.videoId,
                    playerVars: {
                      controls: 0,
                      disablekb: 1,
                      playsinline: 1,
                      rel: 0,
                      fs: 0,
                      iv_load_policy: 3,
                      cc_load_policy: 1,
                      origin: window.location.origin,
                    },
                    events: {
                      onReady: ({ target }) => {
                        target.cueVideoById({
                          videoId: activeSource.videoId,
                          startSeconds: activeSource.startSeconds,
                          endSeconds: activeSource.endSeconds,
                        });
                        setReady(true);
                      },
                      onStateChange: ({ data, target }) => {
                        setPlaying(data === YT.PlayerState.PLAYING);
                        if (data === YT.PlayerState.ENDED) {
                          target.cueVideoById({
                            videoId: activeSource.videoId,
                            startSeconds: activeSource.startSeconds,
                            endSeconds: activeSource.endSeconds,
                          });
                          setEnded(true);
                          setElapsed(duration);
                        }
                      },
                      onError: () => {
                        setPlaying(false);
                        const nextIndex = sourceIndexRef.current + 1;
                        const nextSource = sourcesRef.current[nextIndex];

                        if (nextSource) {
                          sourceIndexRef.current = nextIndex;
                          setReady(false);
                          setEnded(false);
                          setElapsed(0);
                          setActiveSource(nextSource);
                          return;
                        }

                        if (!unavailableNotifiedRef.current) {
                          unavailableNotifiedRef.current = true;
                          const handled = onUnavailableRef.current?.() ?? false;
                          if (handled) {
                            setReady(false);
                            return;
                          }
                        }

                        setError("This clip is temporarily unavailable. Use the full-source link below.");
                      },
                    },
                  });
                })
                .catch((loadError: unknown) => {
                  if (cancelled) return;
                  const handled = onUnavailableRef.current?.() ?? false;
                  if (handled) return;
                  setError(loadError instanceof Error ? loadError.message : "The video player could not be loaded.");
                });

              return () => {
                cancelled = true;
                playerRef.current?.destroy();
                playerRef.current = null;
              };
            }, [activeSource, duration]);

            useEffect(() => {
              if (!playing) return;

              const interval = window.setInterval(() => {
                const player = playerRef.current;
                if (!player) return;

                const current = player.getCurrentTime();
                const clipElapsed = Math.max(0, current - activeSource.startSeconds);
                setElapsed(Math.min(duration, clipElapsed));

                if (current >= activeSource.endSeconds - 0.15) {
                  player.stopVideo();
                  player.cueVideoById({
                    videoId: activeSource.videoId,
                    startSeconds: activeSource.startSeconds,
                    endSeconds: activeSource.endSeconds,
                  });
                  setPlaying(false);
                  setEnded(true);
                  setElapsed(duration);
                }
              }, 150);

              return () => window.clearInterval(interval);
            }, [activeSource, duration, playing]);

            function playOrPause() {
              const player = playerRef.current;
              if (!player || !ready) return;

              if (playing) {
                player.pauseVideo();
                setPlaying(false);
                return;
              }

              if (ended || elapsed === 0) {
                setEnded(false);
                setElapsed(0);
                player.loadVideoById({
                  videoId: activeSource.videoId,
                  startSeconds: activeSource.startSeconds,
                  endSeconds: activeSource.endSeconds,
                });
                return;
              }

              player.playVideo();
            }

            function replay() {
              const player = playerRef.current;
              if (!player || !ready) return;
              setEnded(false);
              setElapsed(0);
              player.loadVideoById({
                videoId: activeSource.videoId,
                startSeconds: activeSource.startSeconds,
                endSeconds: activeSource.endSeconds,
              });
            }

            return (
              <div className="clip-player" data-ready={ready ? "true" : "false"}>
                <div className="clip-player-stage">
                  <div key={activeSource.videoId} id={mountId} ref={mountRef} className="clip-player-mount" />
                  <button
                    type="button"
                    className="clip-player-hitbox"
                    onClick={playOrPause}
                    disabled={!ready || Boolean(error)}
                    aria-label={playing ? "Pause shortened clip" : ended ? "Replay shortened clip" : "Play shortened clip"}
                  >
                    {!playing ? <span className="clip-player-play-icon" aria-hidden="true">{ended ? "↻" : "▶"}</span> : null}
                  </button>
                  {!ready && !error ? <div className="clip-player-loading">Preparing clip…</div> : null}
                  {error ? <div className="clip-player-error">{error}</div> : null}
                </div>

                <div className="clip-player-controls">
                  <button type="button" onClick={ended ? replay : playOrPause} disabled={!ready || Boolean(error)}>
                    {playing ? "Pause" : ended ? "Replay" : "Play"}
                  </button>
                  <progress value={progress} max="100" aria-label="Shortened clip progress" />
                  <span>{formatTime(elapsed)} / {formatTime(duration)}</span>
                </div>

                <div className="clip-player-meta">
                  <span>Selected excerpt: {formatTime(activeSource.startSeconds)}–{formatTime(activeSource.endSeconds)}</span>
                  <a href={activeSource.sourceUrl} target="_blank" rel="noreferrer">Full source ↗</a>
                </div>
                <span className="sr-only">{title}</span>
              </div>
            );
          }
          '''
          clip_path.write_text(clip)
          PY

          rm .github/workflows/apply-yes-no-player-fix.yml

      - name: Install dependencies
        run: npm ci

      - name: Validate case data
        run: npm run validate:cases

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Production build
        run: npm run build

      - name: Commit verified fixes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Use yes-no answers and resilient video playback"
          git push origin main
