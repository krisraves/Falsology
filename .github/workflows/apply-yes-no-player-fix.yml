name: Verify yes-no controls and resilient playback

on:
  push:
    paths:
      - .github/workflows/apply-yes-no-player-fix.yml

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run validate:cases
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build

      - name: Record successful verification
        shell: bash
        run: |
          rm .github/workflows/apply-yes-no-player-fix.yml
          mkdir -p validation
          cat > validation/yes-no-player-fix-passed.md <<'EOF'
          # Yes/no controls and playback fallback verification

          Passed dataset validation, ESLint, strict TypeScript, and the production Next.js build.
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Verify yes-no controls and resilient playback"
          git push origin main
