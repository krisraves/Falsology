name: Find running transcription spaces

on:
  push:
    paths:
      - .github/workflows/find-running-transcription-spaces.yml

permissions:
  contents: write

jobs:
  find:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: exact-statement-windows
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Query runtime metadata
        run: |
          python <<'PY'
          import concurrent.futures,json,urllib.parse,urllib.request
          from pathlib import Path
          ids=[x['id'] for x in json.loads(Path('audit/public-transcription-spaces.json').read_text()) if x.get('id')]
          def fetch(sid):
              try:
                  req=urllib.request.Request('https://huggingface.co/api/spaces/'+urllib.parse.quote(sid,safe='/')+'?expand=runtime,sdk,sha,cardData',headers={'User-Agent':'Mozilla/5.0'})
                  with urllib.request.urlopen(req,timeout=15) as r:data=json.load(r)
                  rt=data.get('runtime') or {}; return {'id':sid,'sdk':data.get('sdk'),'stage':rt.get('stage'),'hardware':rt.get('hardware'),'requestedHardware':rt.get('requestedHardware'),'sleepTime':rt.get('sleepTime'),'sha':data.get('sha'),'host':data.get('host') or rt.get('host'),'cardData':data.get('cardData')}
              except Exception as e:return {'id':sid,'error':f'{type(e).__name__}: {e}'}
          with concurrent.futures.ThreadPoolExecutor(max_workers=20) as ex:rows=list(ex.map(fetch,ids))
          rank={'RUNNING':0,'RUNNING_BUILDING':1,'SLEEPING':2,'PAUSED':8,'BUILD_ERROR':9,'RUNTIME_ERROR':9,'CONFIG_ERROR':9,None:10}
          rows.sort(key=lambda x:(rank.get(x.get('stage'),5),x.get('id','')))
          Path('audit/running-transcription-spaces.json').write_text(json.dumps(rows,indent=2,ensure_ascii=False,default=str)+'\n')
          PY
      - name: Commit results
        run: |
          rm .github/workflows/find-running-transcription-spaces.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Record transcription Space runtimes"
          git pull --rebase origin exact-statement-windows
          git push origin exact-statement-windows
