name: Summarize video candidates

on:
  push:
    paths:
      - .github/workflows/summarize-candidates.yml

permissions:
  contents: write

jobs:
  summarize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Build candidate review sheet
        shell: bash
        run: |
          python <<'PY'
          import json
          import re
          from pathlib import Path

          data = json.loads(Path("research/youtube-candidates.json").read_text())
          trusted = [
            "nasa", "noaa", "smithsonian", "national geographic", "bbc", "pbs", "cbs", "abc", "nbc",
            "cnn", "ap archive", "guardian", "wall street journal", "cnbc", "forbes", "bloomberg",
            "history", "60 minutes", "ted", "vox", "scishow", "insider", "associated press",
            "white house", "c-span", "united nations", "museum", "university", "new york times",
          ]
          stop = {"the","a","an","on","of","and","is","are","than","in","to","video","fact","interview"}

          def score(query, item):
            title = (item.get("title") or "").lower()
            channel = (item.get("channel") or "").lower()
            qwords = {w for w in re.findall(r"[a-z0-9]+", query.lower()) if w not in stop and len(w) > 2}
            overlap = sum(1 for word in qwords if word in title)
            duration = item.get("duration") or 99999
            value = overlap * 3
            if duration <= 60: value += 12
            elif duration <= 180: value += 5
            if any(name in channel for name in trusted): value += 8
            if any(bad in title for bad in ["reaction", "parody", "ai generated", "enhanced by ai", "meme"]): value -= 12
            return value

          lines = ["# Falsology 50-clip candidate review", "", "Short-first ranking. A longer source still requires a verified start/end window of no more than 60 seconds.", ""]
          for key, record in sorted(data["queries"].items()):
            results = record.get("results") or []
            ranked = sorted(results, key=lambda item: score(record["query"], item), reverse=True)
            lines.append(f"## {key} — {record['query']}")
            lines.append("")
            if not ranked:
              lines.append(f"- **NO RESULTS** — {record.get('error')}")
            for index, item in enumerate(ranked[:5], 1):
              duration = item.get("duration")
              duration_text = "unknown" if duration is None else f"{duration}s"
              short = " ✅ FULL VIDEO ≤60s" if duration is not None and duration <= 60 else " ⚠️ NEEDS CLIP WINDOW"
              lines.append(
                f"{index}. `{item.get('videoId')}` — **{item.get('title')}** — {item.get('channel')} — {duration_text}{short} — {item.get('url')}"
              )
            lines.append("")

          Path("research/candidate-review.md").write_text("\n".join(lines) + "\n")
          PY
      - name: Commit review sheet
        shell: bash
        run: |
          rm -f .github/workflows/summarize-candidates.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Summarize 50-claim video candidates"
          git push
