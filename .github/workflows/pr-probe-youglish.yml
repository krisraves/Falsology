name: PR probe YouGlish timestamps

on:
  pull_request:
    branches: [main]

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Playwright
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium
      - name: Inspect YouGlish phrase page
        run: |
          node <<'NODE'
          const {chromium}=require('playwright');const fs=require('fs');
          const phrase='I did not have sexual relations with that woman';
          const url=`https://youglish.com/pronounce/${encodeURIComponent(phrase)}/english`;
          (async()=>{
            const browser=await chromium.launch({headless:true,args:['--disable-blink-features=AutomationControlled','--disable-dev-shm-usage','--no-sandbox','--enable-unsafe-swiftshader']});
            const context=await browser.newContext({locale:'en-US',timezoneId:'America/New_York',viewport:{width:1440,height:1000},userAgent:'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/140.0.0.0 Safari/537.36'});
            await context.addInitScript(()=>{Object.defineProperty(navigator,'webdriver',{get:()=>undefined});Object.defineProperty(navigator,'languages',{get:()=>['en-US','en']});Object.defineProperty(navigator,'plugins',{get:()=>[1,2,3,4,5]})});
            const page=await context.newPage();const requests=[],responses=[],consoleLogs=[],failures=[];
            page.on('console',m=>consoleLogs.push({type:m.type(),text:m.text()}));
            page.on('requestfailed',r=>failures.push({url:r.url(),method:r.method(),resourceType:r.resourceType(),failure:r.failure()}));
            page.on('request',r=>{const u=r.url();if(/youglish|youtube|googlevideo|widget|pronounce|search|fetch|api|result|video/i.test(u))requests.push({url:u,method:r.method(),resourceType:r.resourceType(),postData:(r.postData()||'').slice(0,20000)})});
            page.on('response',async r=>{const u=r.url();if(/youglish|widget|pronounce|search|fetch|youtube|api|result|video/i.test(u)){const x={url:u,status:r.status(),contentType:r.headers()['content-type']};if(!/googlevideo/i.test(u)){try{const b=await r.body();x.bytes=b.length;x.preview=b.toString('utf8').slice(0,150000)}catch(e){x.error=String(e)}}responses.push(x)}});
            let navError=null;try{await page.goto(url,{waitUntil:'domcontentloaded',timeout:60000})}catch(e){navError=String(e)}
            const states=[];
            for(let i=0;i<10;i++){
              await page.waitForTimeout(3000);
              const body=(await page.locator('body').innerText().catch(()=>'' )).slice(0,15000);
              states.push({i,url:page.url(),title:await page.title(),body,frames:page.frames().map(f=>f.url())});
              for(const text of ['Accept','Accept all','Agree','I agree','Continue','Allow all']){try{const b=page.getByRole('button',{name:new RegExp(`^${text}$`,'i')}).first();if(await b.count()&&await b.isVisible())await b.click({force:true,timeout:1500})}catch{}}
            }
            const data=await page.evaluate(()=>{
              const globals={};
              for(const key of Object.keys(window).filter(k=>/yg|youglish|video|player|result|search/i.test(k)).slice(0,300)){
                try{const value=window[key];if(typeof value!=='function')globals[key]=JSON.parse(JSON.stringify(value))}catch{globals[key]=String(window[key])}
              }
              return {
                globals,
                scripts:[...document.scripts].map(s=>({src:s.src,text:s.src?'':s.textContent?.slice(0,50000)})),
                iframes:[...document.querySelectorAll('iframe')].map(f=>({src:f.src,id:f.id,name:f.name,title:f.title})),
                links:[...document.querySelectorAll('a[href]')].map(a=>({href:a.href,text:a.textContent?.trim()})).filter(x=>/youtube|youtu\.be|youglish/i.test(x.href)).slice(0,500),
                html:document.documentElement.outerHTML.slice(0,500000),
                body:document.body.innerText.slice(0,30000)
              };
            }).catch(e=>({error:String(e)}));
            const frameData=[];
            for(const frame of page.frames()){
              try{frameData.push({url:frame.url(),body:(await frame.locator('body').innerText()).slice(0,15000),html:(await frame.content()).slice(0,200000)})}catch(e){frameData.push({url:frame.url(),error:String(e)})}
            }
            const result={phrase,requestedUrl:url,navError,finalUrl:page.url(),states,data,frameData,requests,responses,failures,consoleLogs,cookies:await context.cookies()};
            fs.mkdirSync('probe-output',{recursive:true});fs.writeFileSync('probe-output/youglish.json',JSON.stringify(result,null,2));await browser.close();
          })().catch(e=>{console.error(e);process.exit(1)});
          NODE
      - uses: actions/upload-artifact@v4
        with:
          name: youglish-probe-result
          path: probe-output/youglish.json
          retention-days: 1
