name: Test local-origin captions

on:
  push:
    paths:
      - .github/workflows/test-local-origin-captions.yml

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: exact-statement-windows
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Playwright
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium
      - name: Run local-origin iframe audit
        run: |
          node <<'NODE'
          const { chromium }=require('playwright');const fs=require('fs');const http=require('http');
          const port=8765;const origin=`http://127.0.0.1:${port}`;
          const server=http.createServer((req,res)=>{res.writeHead(200,{'Content-Type':'text/html','Referrer-Policy':'strict-origin-when-cross-origin'});res.end('<!doctype html><html><body><div id="root"></div></body></html>')});
          server.listen(port,'127.0.0.1',async()=>{
            const videos=['TM8EXwemnYA','3MuPWV5cTio','amHb2UoVZ_g'];const results={};
            const browser=await chromium.launch({headless:true,args:['--autoplay-policy=no-user-gesture-required','--disable-dev-shm-usage','--enable-unsafe-swiftshader']});
            for(const videoId of videos){
              const context=await browser.newContext({locale:'en-US'});const page=await context.newPage();const requests=[],responses=[],consoleLogs=[],failures=[];
              page.on('console',m=>consoleLogs.push({type:m.type(),text:m.text()}));page.on('requestfailed',r=>failures.push({url:r.url(),failure:r.failure()}));
              page.on('request',req=>{const u=req.url();if(/timedtext|caption|transcript|youtubei\/v1\/player|\/embed\//i.test(u))requests.push({url:u,method:req.method(),resourceType:req.resourceType()})});
              page.on('response',async resp=>{const u=resp.url();if(/timedtext|caption|transcript|youtubei\/v1\/player|\/embed\//i.test(u)){const row={url:u,status:resp.status(),contentType:resp.headers()['content-type']};try{const b=await resp.body();row.bytes=b.length;row.preview=b.toString('utf8').slice(0,50000)}catch(e){row.error=String(e)}responses.push(row)}});
              await page.goto(origin,{waitUntil:'domcontentloaded'});
              await page.evaluate(({videoId,origin})=>{const f=document.createElement('iframe');f.width='800';f.height='450';f.allow='autoplay; encrypted-media; picture-in-picture';f.src=`https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1&controls=1&cc_load_policy=1&cc_lang_pref=en&hl=en&playsinline=1&rel=0&enablejsapi=1&origin=${encodeURIComponent(origin)}`;document.body.appendChild(f)},{videoId,origin});
              await page.waitForTimeout(10000);let ytFrame=page.frames().find(f=>/youtube\.com\/embed/.test(f.url()));const controls={};
              controls.frames=page.frames().map(f=>f.url());
              if(ytFrame){try{controls.bodyText=(await ytFrame.locator('body').innerText()).slice(0,5000)}catch(e){controls.bodyError=String(e)}
                try{const p=ytFrame.locator('.ytp-large-play-button,.ytp-play-button').first();controls.playCount=await p.count();if(await p.count())await p.click({force:true})}catch(e){controls.playError=String(e)}
                await page.waitForTimeout(3000);
                try{const c=ytFrame.locator('.ytp-subtitles-button').first();controls.ccCount=await c.count();controls.ccTitle=await c.getAttribute('title');if(await c.count())await c.click({force:true})}catch(e){controls.ccError=String(e)}
                try{await ytFrame.locator('video').evaluate(v=>{v.muted=true;v.playbackRate=2;return v.play()})}catch(e){controls.videoStartError=String(e)}
              }
              await page.waitForTimeout(20000);ytFrame=page.frames().find(f=>/youtube\.com\/embed/.test(f.url()));
              if(ytFrame){try{controls.finalBodyText=(await ytFrame.locator('body').innerText()).slice(0,5000)}catch(e){}try{controls.captionText=await ytFrame.locator('.ytp-caption-segment').allInnerTexts()}catch(e){}try{controls.video=await ytFrame.locator('video').evaluate(v=>({currentTime:v.currentTime,duration:v.duration,paused:v.paused,readyState:v.readyState}))}catch(e){controls.videoError=String(e)}}
              results[videoId]={controls,requests,responses,failures,consoleLogs};await context.close();
            }
            await browser.close();server.close();fs.mkdirSync('audit',{recursive:true});fs.writeFileSync('audit/local-origin-caption-test.json',JSON.stringify(results,null,2));
          });
          NODE
      - name: Commit result
        run: |
          rm .github/workflows/test-local-origin-captions.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Record local-origin caption test"
          git pull --rebase origin exact-statement-windows
          git push origin exact-statement-windows
