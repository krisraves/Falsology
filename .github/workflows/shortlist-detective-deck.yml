name: Shortlist detective deck

on:
  push:
    paths:
      - .github/workflows/shortlist-detective-deck.yml

permissions:
  contents: write

jobs:
  shortlist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Build compact review sheet
        shell: bash
        run: |
          python <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path('research/detective-video-candidates.json').read_text())
          preferred = [
            'law&crime', 'court tv', 'associated press', 'ap archive', 'abc news', 'cbs news',
            'nbc news', 'cnn', 'pbs', '60 minutes', 'inside edition', 'today', 'bbc',
            'guardian', 'forbes', 'bloomberg', 'cnbc', 'wsj', 'wall street journal',
            'oxygen', 'crime watch daily', 'dr. phil', 'dr phil', 'true crime daily',
            'national geographic', 'smithsonian', 'biography', 'a&e', 'own'
          ]
          def score(item):
            channel = (item.get('channel') or '').lower()
            duration = item.get('duration') or 99999
            s = 0
            if duration <= 120: s += 1000
            elif duration <= 300: s += 300
            for idx, name in enumerate(preferred):
              if name in channel: s += 500 - idx
            title = (item.get('title') or '').lower()
            for word in ['interrogation','confession','interview','courtroom','testimony','plea','denies','admits','archive','original']:
              if word in title: s += 30
            return (-s, duration, -(item.get('viewCount') or 0))

          lines = ['# Detective deck shortlist', '', 'Candidate footage only. Every final clip still requires statement-level review and evidence.', '']
          for key in sorted(data['queries']):
            record = data['queries'][key]
            lines += [f"## {key} — {record['query']}", '']
            results = sorted(record.get('results') or [], key=score)[:6]
            if not results:
              lines.append(f"- No result: {record.get('error')}")
            for i, item in enumerate(results, 1):
              duration = item.get('duration')
              flag = '✅ ≤120s' if isinstance(duration, (int,float)) and duration <= 120 else '⚠ timestamp required'
              lines.append(f"{i}. `{item.get('id')}` — **{item.get('title')}** — {item.get('channel')} — {duration}s {flag} — {item.get('url')}")
            lines.append('')
          Path('research/detective-shortlist.md').write_text('\n'.join(lines) + '\n')
          PY
      - name: Commit shortlist
        shell: bash
        run: |
          rm .github/workflows/shortlist-detective-deck.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Create detective deck video shortlist"
          git push